<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Legal Playbook — In-House Counsel Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d11;--bg2:#121520;--bg3:#191d28;--bg4:#222736;--bg5:#2c3244;
  --tx:#eef0f6;--tx2:#bcc4d8;--tx3:#7a84a0;
  --bdr:rgba(255,255,255,0.06);--bdr2:rgba(255,255,255,0.1);
  --blue:#4878c8;--blue2:#7aa8f0;
  --green:#4a9468;--amber:#b88838;--red:#a84848;--purple:#7a58a8;--teal:#3a9494;
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;line-height:1.6;min-height:100vh}
button,a{cursor:pointer;font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.screen{display:none}.screen.active{display:block}

/* HEADER */
.hdr{
  position:sticky;top:0;z-index:200;
  width:100%;
  background:rgba(11,13,17,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
}
.hdr-logo{font-family:'Libre Baskerville',serif;font-size:15px;color:var(--tx);white-space:nowrap}
.hdr-logo span{color:var(--blue2)}
.hdr-search{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);
  padding:0 10px;height:34px;
}
.hdr-search input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:13.5px;font-family:'Inter',sans-serif}
.hdr-search input::placeholder{color:var(--tx3)}
.hdr-search .sico{color:var(--tx3);font-size:12px}

/* BACK BAR */
.back-bar{
  display:flex;align-items:center;gap:0;
  background:var(--bg2);border-bottom:1px solid var(--bdr);padding:0;
}
.back-btn-big{
  display:flex;align-items:center;gap:8px;padding:11px 16px;
  background:none;border:none;color:var(--tx2);font-size:13px;font-weight:500;
  transition:color .15s;
}
.back-btn-big:hover{color:var(--tx)}
.back-btn-big .arr{font-size:16px;color:var(--blue2)}
.back-bar-title{font-size:13px;color:var(--tx3);padding-right:16px;margin-left:auto}

/* BOTTOM NAV */
.bot{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(11,13,17,0.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--bdr);display:flex;
}

.home-hero::before{
  content:'';position:absolute;top:-60px;right:-80px;width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,rgba(72,120,200,.1) 0%,transparent 70%);pointer-events:none;
}
.hero-tag{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--blue2);margin-bottom:8px}
.hero-h{font-family:'Libre Baskerville',serif;font-size:27px;line-height:1.2;color:var(--tx);margin-bottom:6px}
.hero-h em{color:var(--blue2);font-style:italic}
.hero-p{font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:16px}
.hero-stats{display:flex;gap:18px}
.hstat{display:flex;flex-direction:column;gap:1px}
.hstat-n{font-family:'Libre Baskerville',serif;font-size:22px;color:var(--tx)}
.hstat-l{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3)}

/* PROGRESS */
.prog-strip{padding:12px 16px;border-bottom:1px solid var(--bdr)}
.prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.prog-label{font-size:11px;color:var(--tx3)}
.prog-pct{font-size:11px;color:var(--blue2);font-weight:600}
.prog-track{height:3px;background:var(--bg5);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--blue2);border-radius:2px;transition:width .5s}
.prog-meta{display:flex;gap:14px;margin-top:8px}
.pmeta{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--tx3)}
.pmeta-dot{width:6px;height:6px;border-radius:50%}

/* SECTIONS */
.sec-lbl{padding:14px 16px 8px;font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--tx3)}

/* CAT GRID */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 16px}
.ccard{
  background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);
  padding:13px;cursor:pointer;transition:border-color .15s,transform .1s;position:relative;overflow:hidden;
}
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ca);opacity:.9}
.ccard:active{transform:scale(.97)}
.ccard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.ccard-icon{font-size:20px;line-height:1}
.ccard-count{font-size:10px;font-weight:700;color:var(--ca);background:rgba(255,255,255,.06);padding:2px 6px;border-radius:8px}
.ccard-name{font-size:12.5px;font-weight:600;color:var(--tx);line-height:1.35;margin-bottom:7px}
.ccard-pb{height:3px;background:var(--bg5);border-radius:2px;overflow:hidden}
.ccard-pf{height:100%;border-radius:2px;transition:width .4s}

/* TOPIC LIST */
.tlist{padding:4px 0}
.titem{
  display:flex;align-items:flex-start;gap:10px;padding:13px 16px;border-bottom:1px solid var(--bdr);
  cursor:pointer;transition:background .12s;
}
.titem:hover{background:var(--bg2)}
.titem-num{font-size:10px;font-weight:700;color:var(--tx3);min-width:20px;margin-top:3px;text-align:right;flex-shrink:0}
.titem-body{flex:1;min-width:0}
.titem-title{font-size:14px;font-weight:600;color:var(--tx);line-height:1.35;margin-bottom:3px}
.titem-intro{font-size:12.5px;color:var(--tx3);font-style:italic;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.titem-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.rdot{width:8px;height:8px;border-radius:50%;background:var(--bg5);margin-top:3px;flex-shrink:0}
.rdot.read{background:var(--green)}.rdot.bkm{background:var(--blue)}
.titem-arr{font-size:12px;color:var(--tx3)}

/* READING PAGE */
.reading-hero{padding:20px 16px 16px;border-bottom:1px solid var(--bdr)}
.reading-cat-tag{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:10px}
.reading-cat-tag .dot{width:6px;height:6px;border-radius:50%}
.reading-title{font-family:'Libre Baskerville',serif;font-size:22px;line-height:1.25;color:var(--tx);margin-bottom:8px}
.reading-intro{font-size:13.5px;color:var(--tx2);line-height:1.7;font-style:italic}

/* READING ACTIONS */
.reading-actions{
  position:sticky;
  bottom:60px;
  z-index:50;
  background:rgba(11,13,17,0.99);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--bdr2);
  border-bottom:1px solid var(--bdr);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:8px;
  max-width:720px;
  width:100%;
}
.btn-read{
  padding:9px 16px;background:transparent;color:var(--tx2);
  border:1px solid var(--bdr2);border-radius:var(--rs);font-size:12.5px;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;white-space:nowrap;
}
.btn-read:hover{color:var(--tx)}
.btn-read.done{background:rgba(74,148,100,.15);border-color:var(--green);color:#6ec990}
.btn-bkm{padding:9px 11px;background:transparent;border:1px solid var(--bdr2);border-radius:var(--rs);font-size:16px;transition:all .15s;color:var(--tx3)}
.btn-bkm.on{background:rgba(72,120,200,.12);border-color:var(--blue2);color:var(--blue2)}
.btn-nav-prev{padding:9px 13px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--rs);color:var(--tx2);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-nav-prev:hover{color:var(--tx)}
.btn-nav-prev:disabled{opacity:.25;cursor:not-allowed}
.btn-nav-next{flex:1;padding:9px 14px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.btn-nav-next:hover{opacity:.9}
.btn-nav-next:disabled{opacity:.2;cursor:not-allowed;background:var(--bg4);color:var(--tx3)}

/* READING CONTENT */
.rcontent{padding:0}
.rsection{padding:16px 16px 16px;margin-bottom:0;border-bottom:1px solid var(--bdr)}
.rsection:last-child{border-bottom:none}
.rsec-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--blue2);opacity:.7;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.rsec-label::after{content:'';flex:1;height:1px;background:var(--bdr)}
.rsec-body{font-size:14.5px;color:var(--tx);line-height:1.8}
.rsec-body strong{color:#a8c8f8;font-weight:600}
.rsec-body em{font-style:italic;color:var(--tx2)}

/* Key points */
.kpts{list-style:none;margin-top:4px}
.kpts li{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:13.5px;color:var(--tx2);line-height:1.65}
.kpts li:last-child{border-bottom:none}
.kpts li strong{color:var(--tx);font-weight:600}
.kpts .pn{font-size:9.5px;font-weight:700;color:var(--blue2);min-width:16px;margin-top:5px;flex-shrink:0}

/* Scenario */
.scenario{background:rgba(72,120,200,.06);border:1px solid rgba(72,120,200,.18);border-left:3px solid var(--blue);border-radius:0 var(--rs) var(--rs) 0;padding:13px 14px;font-size:14px;color:var(--tx);line-height:1.75}
.scenario strong{color:#a8c8f8;font-weight:600}
.scenario-ans{margin-top:10px;padding-top:10px;border-top:1px dashed rgba(72,120,200,.25);font-size:13.5px;color:var(--blue2);font-weight:500;line-height:1.65}

/* Law chip */
.lawchip{display:inline-block;font-size:12px;color:var(--tx3);font-style:italic;background:var(--bg3);border-radius:6px;padding:6px 10px;line-height:1.5}

/* Diagram */
.diagram-wrap{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;overflow-x:auto;margin:4px 0}
.diagram-wrap svg{max-width:100%;height:auto;display:block;margin:0 auto}

/* Takeaway */
.takeaway{background:rgba(74,148,100,.07);border:1px solid rgba(74,148,100,.2);border-radius:var(--r);padding:14px 16px;font-size:14px;color:var(--tx);line-height:1.75}
.takeaway-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:7px;opacity:.9}

/* Mistakes */
.mistake-list{list-style:none;background:rgba(168,72,72,.05);border:1px solid rgba(168,72,72,.15);border-radius:var(--rs);padding:4px 12px}
.mistake-list li{display:flex;gap:8px;padding:9px 0;border-bottom:1px solid rgba(168,72,72,.1);font-size:13.5px;color:var(--tx);line-height:1.65}
.mistake-list li:last-child{border-bottom:none}
.mico{font-size:13px;margin-top:2px;flex-shrink:0}

/* Checklist */
.checklist{list-style:none}
.checklist li{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:13.5px;color:var(--tx2);line-height:1.6}
.checklist li:last-child{border-bottom:none}
.cico{color:var(--blue2);font-size:12px;margin-top:3px;flex-shrink:0}

/* Search */
.search-meta{padding:10px 16px;font-size:12.5px;color:var(--tx3);border-bottom:1px solid var(--bdr)}
.search-meta strong{color:var(--tx2)}

/* Empty */
.empty-state{padding:60px 16px;text-align:center}
.empty-ico{font-size:40px;opacity:.3;margin-bottom:12px}
.empty-msg{font-size:14px;color:var(--tx3);line-height:1.6}

/* Misc */
.tnav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-top:1px solid var(--bdr);font-size:12px;color:var(--tx3)}
.tnav strong{color:var(--tx2)}
mark{background:rgba(72,120,200,.25);border-radius:2px;padding:0 1px;color:inherit}
.spacer{height:14px}

/* ═══════════════════════════════════════════════
   DESKTOP LAYOUT — centered reading column
═══════════════════════════════════════════════ */

/* ── Core shell constraint ── */
.app-shell{
  max-width:720px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:32px;
  position:relative;
  z-index:1;
}

/* ── Header: full-width bar, centered content ── */

.hdr-inner{
  max-width:720px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:10px;
  height:44px;
  padding:0 16px;
}


/* ── Desktop-specific enhancements ── */
@media(min-width:769px){
  body{
    background:#070605;
  }
  /* Ambient depth on either side of the column */
  body::before{
    content:'';
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:radial-gradient(ellipse 60% 100% at 50% 0%, rgba(72,120,200,.04) 0%, transparent 70%);
    pointer-events:none;
    z-index:0;
  }
  .app-shell{
    background:var(--bg);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.05),
      0 0 60px rgba(0,0,0,.8),
      0 0 120px rgba(0,0,0,.5);
  }

}

@media(max-width:768px){
  .app-shell{padding-bottom:24px}
  

/* Toolbar visual alignment — matches content padding */
@media(min-width:769px){
  .reading-actions{
    /* Already constrained by app-shell's 720px max-width.
       Give it the same side padding as content so buttons
       align with the text above. */
    padding:10px 20px;
  }
  .tnav{
    padding:8px 20px;
  }
}

/* === SAVED HERO BUTTON === */
.saved-hero-btn{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  background:rgba(200,80,80,.1);
  border:1px solid rgba(200,80,80,.25);
  border-radius:10px;
  padding:7px 12px;
  cursor:pointer;
  transition:all .15s;
}
.saved-hero-btn:hover{background:rgba(200,80,80,.18);border-color:rgba(200,80,80,.4)}
.saved-ico{font-size:18px;line-height:1;margin-bottom:1px}
.saved-ct{font-family:'Libre Baskerville',serif;font-size:22px;color:#e07070;line-height:1.1}
.saved-hero-btn .hstat-l{color:#c07070}



/* === UPDATED READING ACTIONS === */
.btn-alltopics{
  padding:8px 13px;
  background:rgba(72,120,200,.14);
  border:1px solid rgba(72,120,200,.35);
  border-radius:20px;
  color:var(--blue2);
  font-size:12px;font-weight:600;
  white-space:nowrap;flex-shrink:0;
  transition:all .15s;
}
.btn-alltopics:hover{background:rgba(72,120,200,.25);border-color:var(--blue2)}
.btn-read{
  padding:9px 12px;
  background:transparent;color:var(--tx3);
  border:1px solid var(--bdr2);
  border-radius:var(--rs);font-size:11.5px;font-weight:600;
  flex-shrink:0;white-space:nowrap;
  transition:all .15s;
}
.btn-read:hover{color:var(--tx)}
.btn-read.done{
  background:rgba(74,148,100,.15);border-color:var(--green);
  color:#6ec990;
}

/* === PERSISTENT SEARCH (below progress, home only) === */
.persistent-search{
  padding:0 16px 14px;
  background:var(--bg);
  color-scheme:dark;
}
.psearch-inner{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;
  padding:0 12px;height:36px;max-width:400px;
  color-scheme:dark;
  transition:border-color .15s;
}
.psearch-inner:focus-within{border-color:var(--bdr2)}
.psearch-inner .sico{color:var(--tx3);font-size:13px;flex-shrink:0}
.psearch-inner input{
  flex:1;background:none;border:none;outline:none;
  color:var(--tx);font-size:13.5px;font-family:'Inter',sans-serif;
}
.psearch-inner input::placeholder{color:var(--tx3)}

/* === INLINE SEARCH RESULTS META === */
.search-meta-inline{
  padding:10px 16px 6px;
  font-size:12.5px;color:var(--tx3);
  border-bottom:1px solid var(--bdr);
}
.search-meta-inline strong{color:var(--tx2)}

/* Force dark background on search inputs (browser reset) */
input[type="search"]{
  -webkit-appearance:none;
  appearance:none;
  background:transparent;
  color-scheme:dark;
}
input[type="search"]::-webkit-search-cancel-button{
  -webkit-appearance:none;
}
</style>
</head>
<body>

<div class="hdr" id="hdr" role="banner">
  <div class="hdr-inner">
    <div class="hdr-logo">Legal <span>Playbook</span></div>
  </div>
</div>

<div class="app-shell">
<div class="screen active" id="screen-home">
  <div id="home-static"></div>
  <div id="home-dynamic"></div>
</div>
<div class="screen" id="screen-category"></div>
<div class="screen" id="screen-topic"></div>
<div class="screen" id="screen-bookmarks"></div>
<div class="screen" id="screen-search"></div>

</div><!-- /app-shell -->

<script>

const TOPICS = {

   law:'Federal Constitution; Interpretation Acts 1948 and 1967; Civil Law Act 1956',
   takeaway:'Statute first. Case law second. Constitution above all. Know the hierarchy before giving any legal advice.',
   diagram:`<svg viewBox="0 0 320 160" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">

  ${[

    ['Common Law & Equity','Where statute is silent','#605870',260],
  ].map(([l,d,c,w],i)=>`
  <rect x="${(320-w)/2}" y="${28+i*30}" width="${w}" height="22" rx="5" fill="${c}25" stroke="${c}" stroke-width="1.2"/>
  <text x="160" y="${43+i*30}" text-anchor="middle" fill="${c}" font-size="9.5" font-weight="600">${l}</text>`).join('')}
</svg>`},

  {id:'f2', title:'Statutory Interpretation — Reading the Law Correctly',
   intro:'The words of a statute are not always as clear as they appear. Interpretation is a core legal skill.',
   concept:'Statutory interpretation involves applying rules of construction to determine the meaning and scope of legislation.',
   rule:'Three main approaches: Literal Rule (plain meaning), Golden Rule (avoid absurdity), Mischief Rule (what was the law trying to remedy?). Malaysian courts also apply the purposive approach.',
   explanation:'Section 17A of the Interpretation Acts: "Every written law shall be interpreted purposively, to give effect to the intent of Parliament." This is the default approach in Malaysia.',
   why:'Poorly interpreted statutes lead to wrong legal advice. Understanding interpretation prevents misapplication.',
   hrbp:'When a client says "the Act says X," ask: does the plain reading lead to an absurd result? What was Parliament trying to address? Has a court interpreted this provision?',
   mistakes:['Literal reading of ambiguous provisions without considering legislative intent','Ignoring available Hansard and explanatory statements that illuminate Parliament\'s intention'],
   scenario:'A statute says "a person" must do X. Does this include companies? Answer: Apply the Interpretation Acts — "person" includes a body corporate unless the context requires otherwise.',
   law:'Interpretation Acts 1948 and 1967 (Section 17A); Courts of Judicature Act 1964',
   takeaway:'Read the plain words first. If ambiguous, ask what Parliament intended. Check if courts have already interpreted the provision. Never give advice on bare text alone.'},

  {id:'f3', title:'Legal Privilege — Protecting Legal Advice',
   intro:'Legal professional privilege is one of the most important protections in the legal system. In-house lawyers must understand its limits.',
   concept:'Legal professional privilege (LPP) protects confidential communications between lawyers and clients from compelled disclosure.',
   rule:'Two types: Legal advice privilege (communications for the purpose of giving/receiving legal advice) and Litigation privilege (documents prepared for the dominant purpose of litigation).',
   explanation:'In Malaysia, LPP is recognised under common law and Section 126 of the Evidence Act 1950. However, in-house counsel privilege can be challenged — the communication must be in a legal, not business, advisory capacity.',
   why:'Without LPP, clients could not communicate candidly with lawyers. It is fundamental to access to justice.',
   hrbp:'The "dual role" problem: when in-house counsel acts as both legal advisor and business person in the same communication, privilege may not protect the business parts. Separate legal advice from business commentary.',
   mistakes:['Copying business leaders into privileged legal advice emails without noting the advisory nature','Assuming all communications with in-house counsel are automatically privileged'],
   scenario:'In-house counsel emails the CEO with both legal advice and an opinion on commercial strategy in the same email. Is it privileged? Answer: The legal advice portion may be privileged; the business commentary may not be. Separate them.',
   law:'Evidence Act 1950, Section 126; Common law principles (Balabel v Air India [1988])',
   takeaway:'LPP is purpose-based. Label your legal advice. Keep legal and business functions separate in communications. The dominant purpose test applies.'},

  {id:'f4', title:'How to Structure a Legal Opinion',
   intro:'A well-structured legal opinion is the core deliverable of a legal practitioner. Most junior lawyers learn this too late.',
   concept:'A legal opinion is a written statement of the legal position on a specific question, based on stated facts and applicable law.',
   rule:'Structure: (1) Scope of advice, (2) Facts relied upon, (3) Applicable law, (4) Analysis, (5) Conclusion, (6) Caveats and limitations.',
   explanation:'The scope paragraph is critical — it limits liability and focuses the analysis. "This opinion is limited to [X] under [Y] law and does not address [Z]."',
   why:'Clients make decisions based on legal opinions. A poorly structured or ambiguous opinion can cause serious harm.',
   hrbp:'Business leaders want conclusions first, then reasoning. Lead with the bottom line ("Our view is X"). Then provide the analysis. Never bury the conclusion.',
   mistakes:['Long analytical sections with no clear conclusion','Failing to state what facts were assumed and not verified','Giving unconditional opinions on questions that require qualification'],
   scenario:'A business leader needs a legal opinion by tomorrow. You haven\'t fully reviewed all documents. What do you do? Answer: Provide an interim opinion clearly stating what has been reviewed, what assumptions are made, and that the final opinion is subject to further review.',
   takeaway:'Scope → Facts → Law → Analysis → Conclusion → Caveats. Lead with the conclusion. Caveats protect you — use them properly.'},
  {id:'f5', title:'Legal Research — Finding the Law',
   intro:"Knowing where to look is as important as knowing what to look for.",
   concept:"Legal research is the systematic process of finding the applicable law — statutes, regulations, case law, and commentary — relevant to a specific legal question.",
   rule:"Research hierarchy: (1) Identify the legal issue, (2) Check primary sources (statutes, regulations, case law), (3) Check secondary sources (textbooks, law reviews, legal databases), (4) Verify currency (has the law changed?).",
   explanation:"Key Malaysian legal databases: CLJ (Current Law Journal), MLJ (Malayan Law Journal), Legal Network Series (LNS). Free resources: e-Federal Gazette (legislation), JudgmentSG (for Singapore cases applicable by analogy).",
   why:"You cannot give correct legal advice without finding the correct law. Legal research is the foundation of all legal work.",
   hrbp:"When conducting research: start with the statute, not Google. Read the provision in full. Check if there is an explanatory note or Hansard. Then look for cases interpreting the provision.",
   mistakes:["Relying on legal summaries or Wikipedia without verifying the primary source","Not checking whether a statute has been amended or a case has been overruled"],
   scenario:"You are asked to advise on a data breach. Where do you start? Answer: Personal Data Protection Act 2010 (primary statute) → PDPA Regulations → check for any BNM or other regulatory guidance → cases (if any) interpreting the Act.",
   law:"All primary legislation; CLJ, MLJ, LNS databases",
   takeaway:"Primary source first. Always verify currency. Statute over case law where statute speaks. Know your databases."},

  {id:'f6', title:"The Doctrine of Precedent — How Courts Bind Each Other",
   intro:"Understanding which courts bind which is essential for predicting how a legal argument will be received.",
   concept:"Stare decisis (stand by what was decided) means courts are bound by decisions of higher courts in the same jurisdiction on the same point of law.",
   rule:"Malaysian binding hierarchy: Federal Court (binds all courts) → Court of Appeal (binds High Court) → High Court (persuasive, not binding on each other). Privy Council decisions before 1985: still persuasive.",
   explanation:"Distinguishing cases: if a previous decision is factually different in a material way, a court can 'distinguish' it and not follow it. This is the core skill of common law reasoning.",
   why:"Precedent creates certainty. Knowing which courts bind which helps predict litigation outcomes and gives weight to legal arguments.",
   hrbp:"When advising on litigation prospects: is there Federal Court authority? Court of Appeal? If only High Court decisions exist, the outcome is less predictable.",
   mistakes:["Citing High Court decisions as 'settled law' when there is conflicting High Court authority","Not checking whether a Privy Council case has been superseded by Federal Court authority"],
   scenario:"You find a High Court case directly supporting your position. Is the point settled? Answer: Not definitively — High Court decisions are not binding on other High Courts. Look for Court of Appeal or Federal Court authority.",
   law:"Courts of Judicature Act 1964",
   takeaway:"Federal Court binds everyone. Court of Appeal binds High Court. High Courts do not bind each other. Always find the highest available authority for any proposition."},
  {id:'f7', title:"Professional Ethics — The Lawyer's Obligations",
   intro:'Legal professional ethics are not soft obligations. Breach can result in disbarment, criminal liability, and civil claims.',
   concept:'Lawyers in Malaysia are regulated by the Malaysian Bar (for Peninsular Malaysia) and are subject to the Legal Profession Act 1976 and the Legal Profession (Practice and Etiquette) Rules 1978.',
   rule:'Core duties: duty to the court (overrides duty to client), duty of confidentiality (survives the retainer), duty not to mislead, duty to act in the client\'s best interests, duty to avoid conflicts of interest.',
   explanation:'The hierarchy: duty to the court first, then the client. A lawyer who knows their client is lying to the court has a duty not to assist in the deception, even if it means withdrawing from the case.',
   why:'The legal system depends on lawyers being truthful officers of the court. Without this, the system fails.',
   hrbp:'In-house counsel face a distinct tension: they work for the organisation but remain officers of the court. When asked to facilitate something that crosses an ethical line, the professional obligation overrides the employment relationship.',
   mistakes:["Treating 'what the client wants' as the only consideration without applying independent professional judgment","Continuing to act when a conflict of interest arises instead of disclosing and ceasing"],
   scenario:"A client instructs their in-house counsel to draft a document that obscures a material fact from a regulator. Counsel's obligation? Answer: Refuse. The duty not to assist in misleading a regulator overrides the instruction. This is not a grey area.",
   law:"Legal Profession Act 1976; Legal Profession (Practice and Etiquette) Rules 1978; Bar Council guidance",
   takeaway:"Duty to court > duty to client. Professional ethics survive employment pressure. In-house counsel retain their professional obligations regardless of what the employer demands."},

  {id:'f8', title:"Cross-Border Legal Issues — When Multiple Laws Apply",
   intro:'Modern commercial transactions routinely involve multiple jurisdictions. Knowing which law applies is the first legal question.',
   concept:"Private international law (conflict of laws) determines which country's law applies when a transaction or dispute involves parties or events in more than one jurisdiction.",
   rule:'Rules of thumb: contract (parties can choose governing law — state it expressly), tort (law of the place where the harm occurred), property (law of where the property is located), employment (complex — usually law of the place of employment).',
   explanation:"A contract between a Malaysian company and a Singaporean company, with work performed in Indonesia and a dispute resolved in Malaysia — which law governs? The answer depends on the express governing law clause and, absent one, conflict of laws rules.",
   why:"Failing to identify the governing law of a transaction leads to unexpected outcomes. Different jurisdictions have different rules on limitation periods, remedies, and implied terms.",
   hrbp:"Always specify governing law and jurisdiction in any cross-border contract. 'This agreement shall be governed by and construed in accordance with the laws of Malaysia. The parties submit to the exclusive jurisdiction of the Malaysian courts.' Do not leave this out.",
   mistakes:["No governing law clause in international contracts","Assuming that a Malaysian court will apply Malaysian law to a foreign contract"],
   scenario:"A Malaysian company contracts with a UK supplier. No governing law clause. Dispute arises. Which law applies? Answer: Malaysian courts would apply conflict of laws principles — likely English law given the UK supplier's domicile and where performance occurs. This is preventable with a simple clause.",
   law:"Contracts Act 1950; Civil Law Act 1956; common law conflict of laws principles",
   takeaway:"Always state governing law. Always state dispute resolution jurisdiction. Two sentences that prevent years of litigation about which law applies."},
  {id:'f9', title:"Reading and Analysing Case Law",
   intro:"A judgment is not just a decision — it is legal reasoning that must be extracted, evaluated, and applied.",
   concept:"Case law analysis is the skill of extracting the legal principle (ratio decidendi) from a judgment, understanding the factual context, assessing its binding or persuasive authority, and applying it to a new situation.",
   rule:"Structure of a judgment: facts → issues → law applied → reasoning → decision. The ratio decidendi (the legal principle that decided the case) is binding. Obiter dicta (other statements) are persuasive only.",
   explanation:"Distinguishing a case: if the facts of your situation differ materially from a precedent case, you can argue the principle should not apply. The skill is identifying which facts are material to the principle.",
   why:"Precedent is the engine of common law. You cannot advise confidently on a legal position without knowing the cases that have shaped it.",
   hrbp:"When you find a case that supports your position, also look for cases on the other side. Courts are more persuaded by lawyers who acknowledge the counterarguments and explain why the cases are distinguishable.",
   mistakes:["Citing a case without reading the full judgment — relying on a headnote that mis-states the principle","Not checking whether a case has been appealed and overruled"],
   scenario:"You find a High Court judgment that supports your position. It was decided in 2019. How do you verify it is still good law? Answer: Check CLJ or MLJ for any subsequent Court of Appeal or Federal Court decisions in the same case, and any later cases that have cited, followed, or distinguished it.",
   law:"Common law; stare decisis doctrine",
   takeaway:"Read the full judgment, not the headnote. Extract ratio decidendi, not obiter. Check currency — has it been appealed or superseded? Present both sides; explain the distinguishing factors."},
],

'contracts': [
  {id:'c1', title:'Contract Formation — The Five Elements',
   intro:'A contract that lacks any one of these five elements is not enforceable.',
   concept:'Malaysian contract law (Contracts Act 1950) requires five elements for a valid, enforceable contract.',
   rule:'(1) Offer, (2) Acceptance, (3) Consideration, (4) Capacity, (5) Legality. All five must be present.',
   explanation:'Offer + Acceptance = Agreement. Consideration = something of value exchanged (can be nominal — "RM1" is valid consideration). Capacity: parties must not be minors or of unsound mind. Legality: the purpose must not be illegal.',
   why:'Without valid formation, there is no contract — and no legal remedy for breach.',
   hrbp:'The most common formation problem in commercial contexts: accepting contracts by conduct (performance) without a signed document. Courts can find binding contracts in email exchanges.',
   mistakes:['Assuming no signed document = no contract (courts find contracts in email exchanges and conduct)','Missing capacity issues — contracting with entities that lack authority to bind'],
   scenario:'A supplier starts delivering goods based on email exchange before the formal contract is signed. Is there a binding contract? Answer: Likely yes — there may be a contract formed by offer, acceptance, and performance (consideration).',
   law:'Contracts Act 1950, Sections 2–10',
   takeaway:'Five elements — all required. Watch for contracts formed by conduct before formal documentation. Check authority before contracting.',
   diagram:`<svg viewBox="0 0 320 110" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <text x="160" y="18" text-anchor="middle" fill="#7a58a8" font-size="10" font-weight="700" letter-spacing="1">5 ELEMENTS OF A VALID CONTRACT</text>

  <rect x="${6+i*62}" y="26" width="54" height="72" rx="6" fill="#1e1428" stroke="#7a58a8" stroke-width="${1+i*0.2}" stroke-opacity="${0.5+i*0.1}"/>

  ${e.includes(' ')?`<text x="${33+i*62}" y="70" text-anchor="middle" fill="#7a58a8" font-size="9" font-weight="600">${e.split(' ')[1]}</text>`:''}
  <text x="${33+i*62}" y="${e.includes(' ')?86:70}" text-anchor="middle" fill="#525870" font-size="8">${i+1}</text>
  ${i<4?`<text x="${63+i*62}" y="65" text-anchor="middle" fill="#525870" font-size="12">+</text>`:''}`).join('')}

  {id:'c2', title:'Key Contract Clauses — What Every Lawyer Must Know',
   intro:'The clauses that matter most are often the ones buried at the back.',
   concept:'Certain boilerplate and standard clauses fundamentally alter parties\' rights and should never be accepted without review.',
   rule:'Critical clauses: Limitation of liability, Indemnification, IP ownership, Termination rights, Governing law & jurisdiction, Force majeure, Entire agreement.',
   explanation:'Limitation of liability caps your client\'s recovery. Indemnification can create unlimited obligations. IP ownership clauses determine who owns what is created. Governing law determines which courts apply which rules.',
   why:'These clauses have outsized impact on outcomes. A 5-line limitation clause can wipe out a RM10 million claim.',
   hrbp:'Always read the governing law clause. "This agreement shall be governed by English law" creates significant practical problems for enforcement in Malaysia. Push for Malaysian governing law where your client is a Malaysian entity.',
   mistakes:['Accepting mutual indemnification without understanding the exposure scope','Ignoring IP ownership clauses in service agreements — vendor may own what your company paid to create'],
   scenario:'Software vendor contract says "all IP developed under this agreement belongs to Vendor." Your company is paying for custom software. Is this acceptable? Answer: No — your company should own custom-developed IP. This is non-negotiable.',
   law:'Contracts Act 1950; Civil Law Act 1956',
   takeaway:'Read the back pages. Limitation, indemnification, IP, governing law — these are where deals go wrong. Mark them as negotiation priorities from the first review.',
   diagram:`<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <text x="160" y="18" text-anchor="middle" fill="#7aa8f0" font-size="10" font-weight="700" letter-spacing="1">HIGH-RISK CONTRACT CLAUSES</text>
  ${[
    ['Limitation of Liability','⚠️ Cap on your recovery','#a84848'],
    ['Indemnification','⚠️ Potential unlimited exposure','#a84848'],
    ['IP Ownership','⚠️ Who owns what is created','#b88838'],
    ['Governing Law','📋 Which courts, which rules','#4878c8'],
    ['Termination Rights','📋 Exit conditions and consequences','#4878c8'],
  ].map(([l,d,c],i)=>`
  <rect x="8" y="${24+i*20}" width="304" height="16" rx="3" fill="${c}15" stroke="${c}" stroke-width="0.8" stroke-opacity=".4"/>
  <text x="16" y="${35+i*20}" fill="${c}" font-size="9.5" font-weight="600">${l}</text>
  <text x="296" y="${35+i*20}" text-anchor="end" fill="#525870" font-size="9">${d}</text>`).join('')}
</svg>`},

  {id:'c3', title:'Contract Negotiation — Principled Positions',
   intro:'Effective contract negotiation is not about winning every point. It is about achieving your client\'s commercial objectives.',
   concept:'Commercial contract negotiation requires understanding: your client\'s priorities, the counterparty\'s constraints, and the risk allocation underlying each clause.',
   rule:'Negotiation strategy: (1) Know your non-negotiables, (2) Know your concession points, (3) Understand the counterparty\'s real concern, (4) Trade concessions strategically.',
   explanation:'Lawyers who fight every clause destroy commercial relationships and delay deals. Prioritise: focus energy on clauses that matter commercially, concede on low-stakes issues early to build goodwill.',
   why:'The best legal negotiator protects the client\'s real interests while getting deals done efficiently.',
   hrbp:'Ask your client: "If this negotiation fails, what is the commercial impact?" This defines your walk-away position. Everything else is a concession zone.',
   mistakes:['Marking up every clause on first review, including those that will never be changed','Fighting symbolic battles on low-risk clauses while missing substantive issues'],
   scenario:'Vendor refuses to remove a limitation of liability clause. What do you do? Answer: Understand their concern (insurance, financial risk). Propose a compromise: cap the limitation at a higher multiple of contract value.',
   takeaway:'Know your non-negotiables. Understand their constraints. Trade strategically. Get deals done. Lawyers who delay deals for symbolic wins are not good lawyers.'},

  {id:'c4', title:'Breach of Contract and Remedies',
   intro:'Understanding what happens when a contract is breached determines how you draft the contract in the first place.',
   concept:'A breach of contract occurs when a party fails to perform a contractual obligation. Remedies depend on the type and severity of the breach.',
   rule:'Types of breach: repudiatory (fundamental, entitles innocent party to terminate and claim damages), anticipatory (pre-breach notification), and ordinary (damages, not termination).',
   explanation:'Not every breach entitles termination. Terminating for a non-repudiatory breach puts the terminating party in breach. This is one of the most costly commercial law errors.',
   why:'Understanding remedies shapes how you draft dispute resolution, liquidated damages, and termination clauses.',
   hrbp:'Liquidated damages clauses (pre-agreed damages amounts) are enforceable if they are a genuine pre-estimate of loss, not a penalty. Draft them accordingly.',
   mistakes:['Terminating a contract for a trivial breach (puts the terminating party in breach)','Failing to mitigate losses — the innocent party must take steps to reduce damage'],
   scenario:'A contractor is 2 days late on a milestone. Can you terminate? Answer: Only if the contract makes time of the essence, or if the delay is so fundamental it defeats the purpose of the contract. A 2-day delay is rarely repudiatory.',
   law:'Contracts Act 1950, Sections 74–76; Specific Relief Act 1950',
   takeaway:'Termination is a high-stakes act. Only repudiatory breaches justify it. Get legal advice before exercising termination rights — the cost of getting it wrong is being put in breach yourself.'},
  {id:'c5', title:"Implied Terms — What the Contract Doesn't Say",
   intro:"Contracts cannot address every scenario. Courts fill the gaps with implied terms — but not always the way the parties expected.",
   concept:"Implied terms are contractual obligations not expressly stated but read into the contract by courts on the basis of law, custom, or the business efficacy test.",
   rule:"Four categories: terms implied by statute (e.g., Sale of Goods Act), terms implied by custom (trade usage), terms implied in fact (business efficacy test), terms implied in law (applies to all contracts of a certain type).",
   explanation:"Business efficacy test (The Moorcock): would the implied term be so obvious that it goes without saying? Both parties would answer 'of course' if asked. The term must be necessary, not merely desirable.",
   why:"Without implied terms, contracts would fail in every unforeseen circumstance. Implied terms make contracts work in practice.",
   hrbp:"Employment contracts have an implied term of mutual trust and confidence — this is the foundation of constructive dismissal law. Breaching this implied term (even where not expressly stated) = constructive dismissal.",
   mistakes:["Assuming that because the contract is silent on a point, there is no obligation","Drafting express terms that conflict with terms implied by statute (the statute usually prevails)"],
   scenario:"An employment contract is silent on the notice period for senior management roles. What applies? Answer: The EA minimum notice period is implied by statute. The implied term fills the gap.",
   law:"Contracts Act 1950; The Moorcock (1889); Liverpool City Council v Irwin [1977]",
   takeaway:"Implied terms fill contractual gaps. Know what statutes imply into your contracts. The mutual trust and confidence term is implied into every employment contract."},

  {id:'c6', title:"Misrepresentation and Mistake — When Contracts Can Be Undone",
   intro:"A contract formed on the basis of false information or fundamental mistake may be voidable or void.",
   concept:"Misrepresentation is a false statement of fact that induces a party to enter a contract. Mistake is a fundamental error about the subject matter or terms of the contract.",
   rule:"Types of misrepresentation: fraudulent (knowing falsehood), negligent (careless falsehood), innocent (genuine but false). Fraudulent misrepresentation → voidable contract + damages. Innocent → voidable contract. Common mistake (both parties share the same fundamental error) → contract may be void.",
   explanation:"The representee must have relied on the misrepresentation. Pre-contractual due diligence is important: if the party had the means to discover the truth but did not, reliance may be questioned.",
   why:"Contracting parties must be able to trust the representations they rely on. Misrepresentation protection prevents deliberate deception.",
   hrbp:"M&A context: warranty breaches in a SPA are closely related to misrepresentation. Accurate disclosure is essential — inaccurate warranties can unwind deals or lead to substantial damages claims.",
   mistakes:["Making statements of opinion as if they were statements of fact in pre-contract negotiations","No disclosure schedule in a SPA — relying on verbal assurances instead of documented representations"],
   scenario:"In an M&A negotiation, the seller represents that there are no pending litigation claims. Post-completion, the buyer discovers a RM5 million claim. Remedy? Answer: Misrepresentation claim and/or warranty breach. The remedies depend on the SPA terms and whether the representation was fraudulent, negligent, or innocent.",
   law:"Contracts Act 1950, Sections 17–22; Sale of Goods Act 1957",
   takeaway:"Representations = legal commitments. Never make representations you cannot verify. In M&A, disclosure schedules are your protection against warranty claims."},

  {id:'c7', title:"Force Majeure — Drafting and Applying the Clause",
   intro:"Force majeure is not a magic escape clause. Its scope depends entirely on how it is drafted.",
   concept:"A force majeure clause excuses a party from performance when an extraordinary event beyond their control prevents it.",
   rule:"Requirements: (1) triggering event must fall within the clause's defined events, (2) the event must have actually prevented (not merely hindered) performance, (3) the party must not have assumed the risk, (4) notice must be given.",
   explanation:"COVID-19 was not automatically a force majeure event — it depended on whether 'pandemic,' 'government restriction,' or similar language was in the clause. Clauses drafted narrowly failed during COVID; broad clauses succeeded.",
   why:"Force majeure allocates risk for extraordinary events. It must be drafted carefully — too narrow and it provides no protection; too broad and you cannot rely on the other party's performance.",
   hrbp:"When reviewing contracts: check the force majeure clause's triggering events list. Does it include epidemics/pandemics? Government action? Supply chain disruption? If it is silent on key risks relevant to your business, negotiate additions.",
   mistakes:["Assuming force majeure covers any difficult circumstance (it does not — only defined events)","No notice obligation met — many force majeure clauses require prompt written notice to be effective"],
   scenario:"Manufacturer cannot deliver due to government shutdown. Can they claim force majeure? Answer: Only if: (1) the clause covers government action/pandemic, (2) the shutdown genuinely prevented performance (not just made it more expensive), (3) proper notice was given.",
   law:"Contracts Act 1950; common law",
   takeaway:"Force majeure requires: defined event + actual prevention + proper notice. Draft it broadly enough to cover real risks. Notice obligations must be followed strictly."},

  {id:'c8', title:"Entire Agreement Clauses and Merger Clauses",
   intro:"An entire agreement clause is designed to prevent the other party relying on anything said before the contract was signed.",
   concept:"An entire agreement clause states that the contract represents the entire agreement between the parties, superseding all prior negotiations, representations, and agreements.",
   rule:"Effect: bars claims based on pre-contractual representations (to the extent permitted by law). Does NOT exclude liability for fraudulent misrepresentation. May not exclude statutory implied terms.",
   explanation:"Merger: all prior discussions, emails, term sheets, and letters of intent are superseded. What is in the four corners of the document is all that exists.",
   why:"Entire agreement clauses create certainty and prevent disputes about what was 'agreed' in pre-contract negotiations.",
   hrbp:"The risk: if pre-contract negotiations contained important assurances that were never incorporated into the contract, an entire agreement clause will extinguish reliance on them. Get everything material into the contract.",
   mistakes:["Assuming an entire agreement clause bars all misrepresentation claims (it does not bar fraudulent misrepresentation)","Leaving important commercial terms out of the contract relying on 'what was agreed verbally'"],
   scenario:"Vendor verbally assured your team they would provide support services. Contract has an entire agreement clause. Support was not included in the contract. Remedy? Answer: The entire agreement clause likely bars any claim based on the verbal assurance. This is why verbal assurances must be in the contract.",
   law:"Contracts Act 1950; common law",
   takeaway:"Get everything in the contract. Entire agreement clauses extinguish reliance on pre-contract assurances. They do not bar fraudulent misrepresentation. Never rely on verbal promises outside the four corners."},
  {id:'c9', title:"Letters of Intent and Term Sheets — What They Bind",
   intro:'A "non-binding" term sheet can still bind you to some things. Know exactly what.',
   concept:"A letter of intent (LOI) or term sheet sets out the agreed commercial framework before the formal contract is drafted. Some provisions are binding; some are not.",
   rule:"Typically binding provisions: exclusivity, confidentiality, costs allocation. Typically non-binding: commercial terms, price, completion conditions (unless expressly stated to bind).",
   explanation:"Courts look at the language used: 'subject to contract' and 'non-binding' labels are strong indicators of intent. But if parties have acted in reliance on an LOI's terms for months, a court may find a binding contract has been formed through conduct.",
   why:"Parties need a framework before investing in full contract negotiation. But the LOI must clearly delineate what is and is not binding to avoid disputes about whether a contract has been formed.",
   hrbp:"Draft all LOIs with an explicit 'binding provisions' section and a 'non-binding provisions' section. Never leave the binding/non-binding status to inference. State it explicitly for each material term.",
   mistakes:["Describing an LOI as 'non-binding' without specifying which provisions are binding (confidentiality, exclusivity usually must bind)","Acting extensively on LOI terms without being prepared to argue that a binding contract has been formed by conduct"],
   scenario:"Parties sign a non-binding LOI. The seller relies on the exclusivity provision and turns down another buyer for 3 months. Buyer withdraws. Seller sues. Can they recover? Answer: The exclusivity provision is almost certainly binding (parties relied on it). The seller may recover for breach of the exclusivity term even though the LOI was otherwise non-binding.",
   law:"Contracts Act 1950; common law",
   takeaway:"State explicitly what is binding and what is not in every LOI. Exclusivity and confidentiality usually must bind. 'Non-binding' on the face of the document does not protect you if you act as if it binds."},

  {id:'c10', title:"Limitation of Liability Clauses — Caps, Exclusions, and What Cannot Be Excluded",
   intro:"A liability cap saves a company from existential claims. But drafting it correctly is an art.",
   concept:"A limitation of liability clause restricts the amount or types of damages that can be claimed for breach of contract.",
   rule:"Common structures: cap at contract value, cap at fixed sum, cap at 12 months' fees. Common exclusions from the cap: death or personal injury, fraud, wilful default. What cannot be excluded: liability for death/personal injury caused by negligence (in most jurisdictions).",
   explanation:"The interplay with indemnification: if one clause gives a party an indemnity and another clause caps liability, which governs? Courts interpret these clauses together — often favoring the cap unless the indemnity was expressly carved out.",
   why:"Commercial contracts must allocate risk. A supplier with a RM50,000 contract cannot accept liability for a RM50 million claim. The liability cap aligns risk with reward.",
   hrbp:"When reviewing a contract as the customer: resist the vendor's liability cap where the risk of failure significantly exceeds the contract value. Data breaches, compliance failures, and system outages can cause harm far exceeding the annual fee.",
   mistakes:["Accepting a liability cap without carving out data breach and regulatory fine exposure","No consistency between the liability cap and the indemnification obligations — parties can receive contradictory results depending on which clause is triggered"],
   scenario:"SaaS vendor has a liability cap of '12 months' fees' (RM120,000). A vendor data breach exposes 100,000 customer records. Regulatory fine: RM5 million. Is the vendor's liability truly capped at RM120,000? Answer: Under the contract, yes — unless data breach was carved out of the cap. This is why data breach is a standard carve-out in modern contracts.",
   law:"Contracts Act 1950; Unfair Contract Terms Act equivalents (where applicable)",
   takeaway:"Liability caps must be proportionate to risk. Carve out: fraud, wilful default, data breach, IP infringement, death/injury. Ensure cap and indemnity provisions are consistent with each other."},

  {id:'c11', title:"Contract Termination — Getting Out Cleanly",
   intro:"Terminating a contract incorrectly can put the terminating party in breach. The process matters as much as the right.",
   concept:"Contract termination can occur through: performance (both sides complete obligations), agreement (mutual), breach (one party breaches giving the other the right to terminate), and notice (if the contract provides a termination-for-convenience mechanism).",
   rule:"Termination for breach: only repudiatory breach (fundamental, going to the root of the contract) entitles termination without a contractual provision. The innocent party must accept the repudiation to terminate. Termination for convenience: requires a specific clause granting this right, with notice.",
   explanation:"The risk: a party that terminates for cause (claiming breach) when the breach is not repudiatory becomes the party in breach. This is one of the most expensive mistakes in commercial law.",
   why:"Commercial relationships need clear rules for when they end and how they end. Poorly executed terminations create disputes that negate the value of the original contract.",
   hrbp:"Before terminating any contract: (1) Identify the precise legal basis, (2) Confirm the breach is repudiatory (or rely on a contractual right), (3) Issue the termination notice in the exact manner prescribed by the contract, (4) Get legal advice.",
   mistakes:["Terminating 'for cause' without confirming the breach meets the repudiatory threshold","Sending a termination notice by email when the contract requires registered mail — the notice may not be effective"],
   scenario:"Party A terminates a services contract claiming Party B is in material breach. Party B denies the breach. Party A stops paying. Court finds the breach was not repudiatory. Outcome? Answer: Party A is now in breach for terminating without justification and stopping payment. Party B can claim damages for wrongful termination.",
   law:"Contracts Act 1950, Sections 74–77; common law",
   takeaway:"Termination basis must be legally sound before you act on it. Wrongful termination = you become the breaching party. Get legal advice before any termination for cause. Follow notice formalities exactly."},
  {id:'c12', title:"Software and Technology Agreements",
   intro:"Technology contracts are among the most complex commercial agreements. Standard vendor terms are almost always in the vendor\'s favour — negotiation is essential.",
   concept:"Technology agreements include: SaaS agreements, software licences, IT services agreements, API terms, and cloud service agreements. Each has distinct IP, data, liability, and continuity provisions.",
   rule:"Key negotiation points: (1) Data ownership and portability (your data remains yours, and you can extract it), (2) SLA and service credits (what happens when the service is down?), (3) Liability for data breaches (vendors want to cap this — you need it carved out), (4) Source code escrow (for business-critical software), (5) Exit provisions (transition assistance, data return/destruction).",
   explanation:"The vendor lock-in risk: SaaS vendors who own your data and provide no data portability hold disproportionate power at renewal. Negotiate data portability rights and transition assistance from day one.",
   why:"Technology is increasingly business-critical infrastructure. Technology agreements that are not carefully negotiated create operational, data, and financial risk.",
   hrbp:"For any SaaS platform holding significant business data (HRMS, CRM, financial system): negotiate data portability rights and transition assistance before signing. 'We need 60 days\' assistance on exit to migrate our data' is a standard ask that vendors resist at renewal when they have leverage.",
   mistakes:["Accepting vendor\'s standard terms for business-critical SaaS without negotiation","No data exit provision — discovering at contract end that extracting data requires months of vendor assistance at hourly rates"],
   scenario:"HRMS contract is up for renewal. Vendor has increased pricing by 40%. You want to switch. They have 3 years of employee data. What data exit provisions should you have negotiated 3 years ago? Answer: Data portability (extract all data in standard format), transition assistance (30-60 days of support during migration), data destruction certification after migration.",
   law:"Contracts Act 1950; PDPA 2010 (data processor obligations); common law",
   takeaway:"Technology contracts: data portability, SLA credits, data breach liability carve-out, exit provisions. Negotiate these before signing — vendor leverage disappears at renewal when they have your data."},
],

'corporate': [
  {id:'co1', title:"Directors' Duties — The Core Obligations",
   intro:'A director who does not understand fiduciary duties is a liability to themselves and the company.',
   concept:'Directors of Malaysian companies owe duties both at common law and under the Companies Act 2016.',
   rule:'Key duties: (1) Duty to act in good faith in the best interests of the company, (2) Duty of care and skill, (3) Duty to avoid conflicts of interest, (4) Duty not to make secret profits.',
   explanation:'The "business judgment rule" (Section 214 CA 2016) protects directors who make informed decisions in good faith. But it does not protect directors who are uninformed, conflicted, or not acting bona fide.',
   why:'Directors who breach their duties face personal liability — including disqualification, civil liability, and criminal penalties.',
   hrbp:'An in-house counsel who serves as director must navigate dual obligations. When advising the board, be clear on whether you are speaking as counsel or as director.',
   mistakes:['Not declaring conflicts of interest at board meetings','Rubber-stamping resolutions without independent analysis'],
   scenario:'A director votes to approve a contract with a company he has a stake in, without declaring his interest. What is the risk? Answer: Breach of fiduciary duty. The contract may be voidable. The director faces personal liability.',
   law:'Companies Act 2016, Sections 213–217',
   takeaway:'Four core duties: bona fide, care, no conflict, no secret profit. The business judgment rule protects informed, good-faith decisions. Document board deliberations thoroughly.',
   diagram:`<svg viewBox="0 0 320 110" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <text x="160" y="18" text-anchor="middle" fill="#4a9468" font-size="10" font-weight="700" letter-spacing="1">DIRECTORS' CORE DUTIES</text>
  ${[['Good Faith','Act in company\'s best interests','#4a9468'],['Care & Skill','Informed decisions','#4878c8'],['No Conflict','Declare & avoid','#b88838'],['No Secret Profit','No undisclosed gain','#a84848']].map(([t,d,c],i)=>`
  <rect x="${6+i*78}" y="26" width="68" height="72" rx="6" fill="${c}18" stroke="${c}" stroke-width="1.2"/>
  <text x="${40+i*78}" y="52" text-anchor="middle" fill="${c}" font-size="9.5" font-weight="700">${t}</text>
  <text x="${40+i*78}" y="66" text-anchor="middle" fill="#8a92a8" font-size="8">${d.split(' ').slice(0,2).join(' ')}</text>
  <text x="${40+i*78}" y="78" text-anchor="middle" fill="#8a92a8" font-size="8">${d.split(' ').slice(2).join(' ')}</text>`).join('')}
</svg>`},

  {id:'co2', title:'Corporate Structure and Entity Types',
   intro:'The choice of corporate structure has fundamental legal, tax, and liability implications.',
   concept:'Malaysia\'s corporate structures include Sendirian Berhad (Sdn Bhd), Berhad (public company), limited liability partnership (LLP), and sole proprietorship.',
   rule:'Sdn Bhd (private limited company) provides limited liability and is the most common commercial structure. Berhad is subject to public company obligations including listing rules.',
   explanation:'Limited liability means shareholders are not personally liable for company debts beyond their share capital. The "corporate veil" separates the company from its owners — courts will only pierce it in cases of fraud or where the company is a mere facade.',
   why:'Structure determines liability, governance obligations, tax treatment, and fundraising options.',
   hrbp:'When advising on new ventures, understand the structure implications: who is liable, who has control, how are profits distributed, what are the exit mechanisms?',
   mistakes:['Treating a Sdn Bhd like a partnership — commingling personal and company funds (assists veil-piercing)','Not understanding the implications of being a substantial shareholder in a public company'],
   scenario:'A sole director pays company funds into his personal account for "convenience." What is the legal risk? Answer: Veil-piercing risk. Courts may hold the director personally liable if the company is used as a facade to shield personal liability.',
   law:'Companies Act 2016; Limited Liability Partnerships Act 2012',
   takeaway:'Separate the company from its owners — legally and practically. Commingling funds is the fastest route to personal liability.'},

  {id:'co3', title:'Company Secretarial and Statutory Compliance',
   intro:'Company secretarial obligations are not administrative — they are legal requirements with real penalties.',
   concept:'Every company in Malaysia must comply with the Companies Act 2016\'s ongoing statutory requirements, including annual returns, financial statements, and statutory registers.',
   rule:'Key obligations: Annual Return (SSM), Audited Financial Statements, Register of Members, Register of Directors, Notification of changes within prescribed timeframes.',
   explanation:'The in-house counsel often oversees cosec compliance. Late filing, failure to maintain registers, and failure to notify changes are all offences under the Companies Act.',
   why:'Statutory compliance is a baseline. Deficient records create problems during M&A due diligence, regulatory inquiries, and disputes.',
   hrbp:'Build a compliance calendar with all statutory deadlines for each entity in the group. A missed annual return deadline is a criminal offence for directors.',
   mistakes:['Treating cosec as purely administrative — failing to involve legal in significant company changes','Not updating statutory registers when directors, shareholders, or auditors change'],
   scenario:'A company changes its registered address but fails to update SSM within the prescribed period. Consequence? Answer: Offence by the company and every officer in default. Penalty: fine.',
   law:'Companies Act 2016, Sections 47, 51, 58, 68',
   takeaway:'Company secretarial is legal compliance. Maintain a compliance calendar. Treat cosec deadlines with the same urgency as court deadlines.'},
  {id:'co4', title:"Minority Shareholder Rights and Oppression",
   intro:"A minority shareholder is not powerless. The Companies Act provides significant protections against oppressive conduct.",
   concept:"Minority shareholders in Malaysian companies have statutory remedies when the majority exercises its control in a manner that is oppressive, unfairly prejudicial, or in disregard of minority interests.",
   rule:"Remedies under CA 2016: Section 346 (unfair prejudice and oppression remedy), Section 347 (personal actions), derivative action (Section 348 — suing on behalf of the company).",
   explanation:"Section 346 applies where the affairs of the company are being or have been conducted in a manner oppressive to the minority, or where the powers of the directors are being exercised in a manner unfairly prejudicial or which disregards the interests of the minority.",
   why:"Without minority protection, controlling shareholders could extract all value from a company while leaving minority investors with nothing.",
   hrbp:"JV context: if your client has a minority stake in a JV, understand their Section 346 rights before signing the JV agreement. Strong reserved matters can make a minority stake as powerful as a majority.",
   mistakes:["Assuming a minority shareholder has no rights because they hold < 50%","Not including minority protection provisions in JV agreements"],
   scenario:"A majority shareholder excludes the minority from the board, stops declaring dividends, and awards contracts to his related parties. Remedy? Answer: Section 346 oppression petition. Courts have broad discretion to order buy-out, restructuring, or winding up.",
   law:"Companies Act 2016, Sections 346–350",
   takeaway:"Minority ≠ powerless. Section 346 provides broad relief for oppressive conduct. Strong reserved matters and shareholder agreements supplement statutory rights."},

  {id:'co5', title:"Corporate Transactions — Share Sale vs Asset Sale",
   intro:"The difference between buying shares and buying assets is not just technical — it determines what risk you inherit.",
   concept:"In a share sale, the buyer acquires the company (with all its liabilities). In an asset sale, the buyer acquires specific assets (and can leave liabilities behind).",
   rule:"Share sale: buyer inherits all historical liabilities (disclosed and undisclosed). Seller's key protection: warranty and indemnity package. Asset sale: buyer chooses what to take; unknown liabilities generally stay with the seller.",
   explanation:"Tax implications differ. Employment continuity differs — a share sale typically keeps employees employed (TUPE equivalent); an asset sale may require new employment contracts.",
   why:"The transaction structure determines risk allocation. This decision is made early and has cascading effects on due diligence scope, documentation, and pricing.",
   hrbp:"Employment perspective: in a share sale, the acquiring company inherits all employment contracts, including historic claims. In an asset sale, employees may be re-hired on new terms — subject to employment law constraints.",
   mistakes:["Structuring as a share sale without full historical DD — inheriting undisclosed employment claims, tax liabilities, or regulatory violations","Asset sale without addressing employee transfer — triggering unfair dismissal or redundancy claims from employees not re-hired"],
   scenario:"You are acquiring a restaurant business. Should you buy the company (share sale) or the assets (asset sale)? Answer: Almost certainly asset sale — you want the premises, equipment, and brand but not the historical liabilities of the company entity.",
   law:"Companies Act 2016; Employment Act 1955; Transfer of Undertakings principles",
   takeaway:"Share sale = you buy everything including the skeletons. Asset sale = you choose what you take. Choose the structure before you do the diligence. Structure determines risk exposure."},
  {id:'co6', title:"Corporate Restructuring — Legal Steps",
   intro:"Restructuring a corporate group involves layers of regulatory, contractual, and employment obligations that must be sequenced correctly.",
   concept:"Corporate restructuring includes: mergers, demergers, share transfers between group companies, business transfers, and liquidations. Each has distinct legal requirements.",
   rule:"Key legal steps for a group share transfer: board approval (both transferor and transferee), stamp duty on transfer instrument, SSM notification, updated statutory registers, bank and lender consents (change of control provisions), regulatory approvals (sector-specific).",
   explanation:"Change of control provisions in commercial contracts are the most commonly missed issue in restructuring. A contract may automatically terminate or require consent upon a change of ownership. Reviewing material contracts for change of control clauses is essential before any transaction.",
   why:"Restructuring done without proper sequencing can void contracts, trigger regulatory breaches, and create hidden liabilities.",
   hrbp:"Employment law in restructuring: employees do not automatically transfer with a business. A share purchase retains existing employment contracts. An asset purchase requires new employment arrangements. Get this right.",
   mistakes:["Missing change of control provisions in key contracts — triggering termination rights or consent requirements","No regulatory pre-approval obtained — completing a transaction only to discover it required BNM, SC, or MCMC approval"],
   scenario:"A group transfers its Malaysian operating company's shares to a new holding structure. The operating company holds a telecoms licence. What step is most commonly missed? Answer: Regulatory approval from MCMC. Licences typically have change of ownership provisions requiring prior regulatory consent. Completing the transfer before approval may void the licence.",
   law:"Companies Act 2016; sector-specific licensing legislation; Employment Act 1955",
   takeaway:"Restructuring checklist: board approvals, stamp duty, SSM filings, regulatory consents, bank/lender waivers, material contract review (change of control), employment implications. Miss one and the rest of the structure may unravel."},
  {id:'co7', title:"Annual General Meeting — Requirements and Best Practice",
   intro:"An AGM is a statutory requirement. But done well, it is also a governance and stakeholder confidence moment.",
   concept:"Every Malaysian public company must hold an AGM within 6 months of its financial year end. Private companies are no longer required to hold AGMs (CA 2016 change) but many still do for governance reasons.",
   rule:"AGM agenda must include: presentation of audited financial statements, declaration of dividend (if any), re-election of directors retiring by rotation, re-appointment of auditors and fixing of their remuneration, and any other business.",
   explanation:"Proxies: shareholders can appoint proxies to attend and vote on their behalf. The proxy form must be received by the company within the prescribed period before the AGM.",
   why:"The AGM is the annual accountability mechanism — the moment shareholders formally review the company's stewardship and exercise their governance rights.",
   hrbp:"In-house counsel\'s role in AGM preparation: circular review and disclosure advice, Q&A preparation (anticipate contentious questions from minority shareholders), corporate secretarial coordination, and post-AGM compliance (lodging resolutions with SSM).",
   mistakes:["AGM circular disclosures that are technically compliant but misleading in substance","Directors unable to answer shareholder questions about company performance — inadequate AGM preparation"],
   scenario:"A minority shareholder submits a question before the AGM asking for detailed breakdown of directors\' fees by individual. Is the company obliged to answer? Answer: Directors\' fees are disclosed in aggregate in the annual report. Individual breakdown is not mandated. However, the company should consider the governance optics of refusal.",
   law:"Companies Act 2016, Sections 340–350; Bursa Malaysia Listing Requirements (for public listed companies)",
   takeaway:"AGM: 6 months from FYE (public companies). Core agenda items are prescribed. Prepare directors for shareholder questions. Post-AGM: lodge resolutions with SSM within prescribed period."},
],

'employment-legal': [
  {id:'el1', title:'Employment Law from the Counsel Perspective',
   intro:'In-house counsel approach employment law differently from HR — they manage legal risk, not just compliance.',
   concept:'The in-house counsel\'s role in employment matters: advising on dismissal risk, reviewing disciplinary process, drafting settlement agreements, and managing Industrial Court exposure.',
   rule:'Key principle: substantive (valid reason) AND procedural (fair process) requirements must BOTH be satisfied. A valid reason + flawed process = unfair dismissal.',
   explanation:'The Industrial Court is highly accessible — employees pay no filing fees. Any termination, even one with strong grounds, can be challenged. The cost of defending a weak case far exceeds the cost of a careful process.',
   why:'Employment disputes are the most frequent legal matter for Malaysian in-house teams. Getting the process right before termination is essential.',
   hrbp:'Before any termination, ask: "Can we defend this at the Industrial Court?" Prepare the file as if it will be litigated. It may be.',
   mistakes:['Approving termination without reviewing the disciplinary file for procedural completeness','Not advising HR to preserve all communications and documents before the employee is notified'],
   scenario:'HR wants to terminate an employee for poor performance. No PIP, no warnings, one informal conversation documented. Legal should advise? Answer: Do not proceed. The procedural basis is insufficient. Implement a documented PIP first.',
   law:'Industrial Relations Act 1967, Section 20; Employment Act 1955',
   takeaway:'See every termination through the lens of an Industrial Court filing. If you cannot defend it with the file in front of you, do not proceed.'},

  {id:'el2', title:'Settlement Agreements — Drafting and Enforceability',
   intro:'A poorly drafted settlement deed is not worth the paper it is written on.',
   concept:'Settlement agreements (typically deeds) resolve employment disputes and release the company from further claims. They must be properly drafted and executed.',
   rule:'Requirements: full and final settlement language, specific consideration (above statutory minimums), explicit waiver of all claims under EA and IRA, proper execution (signed, witnessed, company seal where required).',
   explanation:'A generic "receipt and discharge" form is often insufficient to bar IRA claims. The Industrial Court will look at whether the settlement expressly covers the specific claim being brought.',
   why:'Settlement is the preferred resolution for most employment disputes — it provides certainty and avoids litigation cost.',
   hrbp:'The settlement amount must be meaningfully above what the employee would receive at Industrial Court to make it a genuine compromise. Courts will look at adequacy of consideration.',
   mistakes:['Using a generic receipt without explicit statutory claim waivers','Not ensuring the employee had independent legal advice (important for enforceability)'],
   scenario:'Employee receives VSS payout and signs a generic receipt. 3 months later files Industrial Court claim. Barred? Answer: Depends on exact wording. Generic receipt may not bar an IRA claim. Use a properly drafted deed every time.',
   law:'Contracts Act 1950; Industrial Relations Act 1967; Evidence Act 1950',
   takeaway:'Settlement deeds must: state full and final settlement, specify all claims waived, include consideration above the statutory floor, be properly executed. Have legal draft them — not HR.'},
  {id:'el3', title:"Employment Contracts — In-House Counsel\'s Review Checklist",
   intro:"The standard employment contract is rarely standard. These are the provisions in-house counsel must check every time.",
   concept:"In-house counsel reviewing employment contracts should prioritise: IP assignment, confidentiality scope, restraint of trade reasonableness, dispute resolution, governing law, and the interaction between the contract and the EA.",
   rule:"Key review items: IP assignment (all IP created in scope of employment must be assigned to employer), confidentiality (survive termination; define scope clearly), non-solicitation (of clients and employees — more enforceable than non-compete), governing law (Malaysian law for Malaysian employees).",
   explanation:"A common drafting error: IP clauses that only assign 'works created using company resources' — missing IP created on personal time but within the scope of employment. Employment Act Section 26A provides some protection but an explicit clause is better.",
   why:"Employment contracts are long-term risk documents. Deficiencies only manifest in disputes — which is the worst time to discover them.",
   hrbp:"Build an employment contract review template: a checklist of 15–20 key provisions that must be present, with the standard language for each. Review every template against this checklist annually.",
   mistakes:["IP clause covers 'during employment hours' only — misses inventions on evenings/weekends in same field","Restraint of trade clause with no geographic or temporal limit — immediately unenforceable"],
   scenario:"A software developer resigns and continues developing the app he was working on for the company, in his personal time, claiming it was a personal project. The employment contract says 'all IP created using company resources belongs to the company.' He used his own laptop. Who owns it? Answer: Likely the employee, if the contract only covers resource-based IP. A proper IP clause would cover 'all IP created in the scope of employment, regardless of resources used.'",
   law:"Contracts Act 1950; Copyright Act 1987; Employment Act 1955",
   takeaway:"Employment contract IP clause must cover: scope of employment, not just company resources. Non-solicitation of clients and employees is more enforceable than non-compete. Governing law must be specified. Review template annually."},

  {id:'el4', title:"Managing Legal Risk in HR Decisions",
   intro:"Every significant HR decision has a legal dimension. In-house counsel\'s role is to identify it before the decision is made, not after.",
   concept:"Legal risk in HR decisions arises from: discrimination exposure (protected characteristics), procedural compliance (EA and IRA), contractual compliance (employment contract terms), and regulatory compliance (EPF, SOCSO, minimum wage).",
   rule:"Pre-decision legal review is required for: any termination, restructuring or retrenchment, significant pay changes, role changes (especially downward), and discipline of a protected employee.",
   explanation:"The cost of a legal review before a decision is a fraction of the cost of litigation after one. In-house counsel should be embedded in the decision process, not consulted after the fact.",
   why:"HR decisions are the highest-frequency source of legal claims for most Malaysian organisations. Early involvement prevents expensive mistakes.",
   hrbp:"Create an 'HR legal review trigger list' — a specific list of decision types that require in-house counsel review before action. Distribute to all HR managers. Track compliance with the trigger list.",
   mistakes:["HR proceeds with a termination and informs legal after the fact","Legal is consulted as a 'sign-off' function rather than an advisory function — receiving a decision for rubber-stamping rather than shaping"],
   scenario:"HR wants to restructure a team and retrench 2 employees, with one being a recent whistleblower. The legal team is informed after the decision and asked to 'make the paperwork work.' What should legal do? Answer: Advise that the decision as structured carries significant legal risk. Recommend a structured review against the WPA. Document the legal position. This is an advisory role, not an execution role.",
   law:"Industrial Relations Act 1967; Whistleblower Protection Act 2010; Employment Act 1955",
   takeaway:"Legal review before HR decisions, not after. Build a trigger list of decision types requiring legal involvement. Document legal advice given and whether it was followed."},
  {id:'el5', title:"Industrial Harmony and the Role of Legal in HR Decisions",
   intro:'In-house legal and HR must work as a unit. Legal acting as a gatekeeper after HR decisions are made is the wrong model.',
   concept:'The in-house counsel\'s most effective role in employment matters is upstream — embedded in the decision process before it crystallises, not reviewing paperwork afterwards.',
   rule:'Model of engagement: Legal attends or is briefed before: any termination decision, any retrenchment, any significant disciplinary action, any change to material employment terms. Legal\'s input shapes the decision, not just the documentation.',

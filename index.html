// ═══════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════
function showHome() {
  currentCat=null;currentTopic=null;searchQ='';
  const si = document.getElementById('searchInput'); if(si) si.value = '';
  renderHome();showScreen('home');
  
}
function renderHome() {
  const p = globalProgress();

  // ── Static zone (hero, progress, search) — render once, never touched by search
  const staticEl = document.getElementById('home-static');
  if (staticEl && !staticEl.dataset.rendered) {
    staticEl.dataset.rendered = '1';
    staticEl.innerHTML = `
  <div class="home-hero">
    <div class="hero-tag">⚖️ Professional Learning</div>
    <div class="hero-h">The <em>Legal</em> Playbook</div>
    <div class="hero-p">Build the knowledge base of a strong in-house counsel — from legal foundations to AML/CFT, dispute resolution, and corporate governance.</div>
    <div class="hero-stats">
      <div class="hstat"><span class="hstat-n">${p.total}</span><span class="hstat-l">Topics</span></div>
      <div class="hstat"><span class="hstat-n">${CATS.length}</span><span class="hstat-l">Modules</span></div>
      <div class="hstat"><span class="hstat-n">${p.read}</span><span class="hstat-l">Read</span></div>
      <div class="hstat" style="margin-left:auto">
        <button class="saved-hero-btn" onclick="showBookmarks()" title="Saved topics">
          <span class="saved-ico">🔖</span>
          <span class="saved-ct">${p.bkm}</span>
          <span class="hstat-l">Saved</span>
        </button>
      </div>
    </div>
  </div>
  <div class="prog-strip">
    <div class="prog-row"><span class="prog-label">Overall Progress</span><span class="prog-pct">${p.pct}%</span></div>
    <div class="prog-track"><div class="prog-fill" style="width:${p.pct}%"></div></div>
    <div class="prog-meta">
      <div class="pmeta"><div class="pmeta-dot" style="background:var(--green)"></div>${p.read} Read</div>
      <div class="pmeta"><div class="pmeta-dot" style="background:var(--amber)"></div>${p.bkm} Saved</div>
    </div>
  </div>
  <div class="persistent-search" id="persistentSearch">
    <div class="psearch-inner">
      <span class="sico">⌕</span>
      <input id="searchInput" type="search" placeholder="Search concepts…" autocomplete="off">
    </div>
  </div>`;
  } else if (staticEl) {
    // Update progress numbers without re-rendering (keeps input alive)
    const pctEl = staticEl.querySelector('.prog-pct');
    const fillEl = staticEl.querySelector('.prog-fill');
    const readEl = staticEl.querySelectorAll('.pmeta')[0];
    const bkmEl = staticEl.querySelectorAll('.pmeta')[1];
    const savedCt = staticEl.querySelector('.saved-ct');
    if (pctEl) pctEl.textContent = p.pct + '%';
    if (fillEl) fillEl.style.width = p.pct + '%';
    if (readEl) readEl.innerHTML = `<div class="pmeta-dot" style="background:var(--green)"></div>${p.read} Read`;
    if (bkmEl) bkmEl.innerHTML = `<div class="pmeta-dot" style="background:var(--amber)"></div>${p.bkm} Saved`;
    if (savedCt) savedCt.textContent = p.bkm;
  }

  // ── Dynamic zone (modules grid) — always safe to replace
  renderModules();
}

function renderModules() {
  const dynEl = document.getElementById('home-dynamic');
  if (!dynEl) return;
  let html = `<div class="sec-lbl">Modules</div><div class="cat-grid">`;
  CATS.forEach(cat => {
    const pct = catProgress(cat.id);
    const cnt = topicsInCat(cat.id).length;
    html += `
    <div class="ccard" style="--ca:${cat.accent}" onclick="showCategory('${cat.id}')">
      <div class="ccard-top">
        <span class="ccard-icon">${cat.icon}</span>
        <span class="ccard-count">${cnt}</span>
      </div>
      <div class="ccard-name">${cat.name}</div>
      <div class="ccard-pb"><div class="ccard-pf" style="width:${pct}%;background:${cat.accent}"></div></div>
    </div>`;
  });
  html += `</div><div class="spacer"></div>`;
  dynEl.innerHTML = html;
}

// ═══════════════════════════════════════════════
// CATEGORY
// ═══════════════════════════════════════════════
function showCategory(catId){
  currentCat=catId;renderCategory();showScreen('category');
}
function renderCategory(){
  const cat=CATS.find(c=>c.id===currentCat);
  const topics=topicsInCat(currentCat);
  const pct=catProgress(currentCat);
  let html=`
  <div class="back-bar">
    <button class="back-btn-big" onclick="showHome()">
      <span class="arr">←</span> All Topics
    </button>
    <span class="back-bar-title">${pct}% complete</span>
  </div>
  <div style="padding:16px 16px 12px;border-bottom:1px solid var(--bdr)">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span style="font-size:26px">${cat.icon}</span>
      <div>
        <div style="font-family:'Libre Baskerville',serif;font-size:20px;color:var(--tx)">${cat.name}</div>
        <div style="font-size:12px;color:var(--tx3);margin-top:2px">${topics.length} topics</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="flex:1;height:4px;background:var(--bg5);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${cat.accent};border-radius:2px;transition:width .4s"></div>
      </div>
      <span style="font-size:11.5px;color:${cat.accent};font-weight:600">${pct}%</span>
    </div>
  </div>
  <div class="tlist">`;
  topics.forEach((t,i)=>{
    const st=saved[t.id]||{};
    const dotClass=st.r?'read':st.b?'bkm':'';
    html+=`
    <div class="titem" onclick="showTopic('${currentCat}','${t.id}')">
      <span class="titem-num">${i+1}</span>
      <div class="titem-body">
        <div class="titem-title">${t.title}</div>
        <div class="titem-intro">${t.intro}</div>
      </div>
      <div class="titem-right">
        <div class="rdot ${dotClass}"></div>
        <span class="titem-arr">›</span>
      </div>
    </div>`;
  });
  html+=`</div><div class="spacer"></div>`;
  document.getElementById('screen-category').innerHTML=html;
}

// ═══════════════════════════════════════════════
// TOPIC READING
// ═══════════════════════════════════════════════
function showTopic(catId,topicId){
  currentCat=catId;currentTopic=topicId;renderTopic();showScreen('topic');
}
function renderTopic(){
  const cat=CATS.find(c=>c.id===currentCat);
  const topics=topicsInCat(currentCat);
  const idx=topics.findIndex(t=>t.id===currentTopic);
  const topic=topics[idx];
  if(!topic){showCategory(currentCat);return;}
  const st=saved[topic.id]||{};
  const isRead=!!st.r;const isBkm=!!st.b;
  const prevT=topics[idx-1];const nextT=topics[idx+1];

  let html=`
  <div class="back-bar">
    <button class="back-btn-big" onclick="showCategory('${currentCat}')">
      <span class="arr">←</span> All Topics
    </button>
    <span class="back-bar-title">${cat.name}</span>
  </div>
  <div class="reading-hero">
    <div class="reading-cat-tag">
      <div class="dot" style="background:${cat.accent}"></div>
      ${cat.name}
    </div>
    <div class="reading-title">${topic.title}</div>
    <div class="reading-intro">${topic.intro}</div>
  </div>`;

  html+=`<div class="rcontent">`;

  if(topic.concept){html+=`<div class="rsection"><div class="rsec-label">Concept</div><div class="rsec-body">${fmt(topic.concept)}</div></div>`;}
  if(topic.rule){html+=`<div class="rsection"><div class="rsec-label">The Rule</div><div class="rsec-body">${fmt(topic.rule)}</div></div>`;}
  if(topic.diagram){html+=`<div class="rsection"><div class="diagram-wrap">${topic.diagram}</div></div>`;}
  if(topic.explanation){html+=`<div class="rsection"><div class="rsec-label">Explanation</div><div class="rsec-body">${fmt(topic.explanation)}</div></div>`;}
  if(topic.why){html+=`<div class="rsection"><div class="rsec-label">Why This Matters</div><div class="rsec-body">${fmt(topic.why)}</div></div>`;}
  if(topic.hrbp){html+=`<div class="rsection"><div class="rsec-label">In-House Perspective</div><div class="rsec-body">${fmt(topic.hrbp)}</div></div>`;}
  if(topic.mistakes&&topic.mistakes.length){
    html+=`<div class="rsection"><div class="rsec-label">Common Mistakes</div><ul class="mistake-list">`;
    topic.mistakes.forEach(m=>{html+=`<li><span class="mico">⚠️</span>${fmt(m)}</li>`;});
    html+=`</ul></div>`;
  }
  if(topic.scenario){
    const ansIdx=topic.scenario.indexOf('Answer:');
    if(ansIdx>-1){
      const q=topic.scenario.substring(0,ansIdx).trim();
      const a=topic.scenario.substring(ansIdx).trim();
      html+=`<div class="rsection"><div class="rsec-label">Scenario</div><div class="scenario">${fmt(q)}<div class="scenario-ans">${fmt(a)}</div></div></div>`;
    } else {
      html+=`<div class="rsection"><div class="rsec-label">Scenario</div><div class="scenario">${fmt(topic.scenario)}</div></div>`;
    }
  }
  if(topic.law){html+=`<div class="rsection"><div class="rsec-label">Legal Reference</div><span class="lawchip">${fmt(topic.law)}</span></div>`;}
  if(topic.takeaway){html+=`<div class="rsection"><div class="takeaway-lbl">Key Takeaway</div><div class="takeaway">${fmt(topic.takeaway)}</div></div>`;}
  html+=`</div>`;

  html+=`
  <div class="reading-actions">
    <button class="btn-alltopics" onclick="showCategory('${currentCat}')">
      ← Topics
    </button>
    <button class="btn-read ${isRead?'done':''}" onclick="toggleRead('${topic.id}')">
      ${isRead?'✓ Read':'○ Read'}
    </button>
    <button class="btn-bkm ${isBkm?'on':''}" onclick="toggleBkm('${topic.id}')" title="Bookmark">🔖</button>
    <button class="btn-nav-next" onclick="showTopic('${currentCat}','${nextT?.id}')" ${!nextT?'disabled':''}>
      ${idx+1}/${topics.length} ${nextT?'· Next →':'· End'}
    </button>
  </div>`;
  html+=`<div class="tnav"><span>${idx+1} of ${topics.length}</span><strong>${cat.name}</strong></div>`;
  html+=`<div class="spacer"></div>`;
  document.getElementById('screen-topic').innerHTML=html;
}

function toggleRead(id){saved[id]=saved[id]||{};saved[id].r=!saved[id].r;save();renderTopic();}
function toggleBkm(id){saved[id]=saved[id]||{};saved[id].b=!saved[id].b;save();renderTopic();}

// ═══════════════════════════════════════════════
// BOOKMARKS
// ═══════════════════════════════════════════════
function showBookmarks(){renderBookmarks();showScreen('bookmarks');}
function renderBookmarks(){
  const all=allTopics();
  const bkm=all.filter(t=>saved[t.id]?.b);
  const read=all.filter(t=>saved[t.id]?.r);
  let html=`
  <div class="back-bar">
    <button class="back-btn-big" onclick="showHome()">
      <span class="arr">←</span> Home
    </button>
  </div>
  <div style="padding:16px 16px 12px;border-bottom:1px solid var(--bdr)">
    <div style="font-family:'Libre Baskerville',serif;font-size:22px;color:var(--tx);margin-bottom:4px">Saved Topics</div>
    <div style="font-size:12.5px;color:var(--tx3)">${bkm.length} bookmarked · ${read.length} read</div>
  </div>`;
  if(!bkm.length){
    html+=`<div class="empty-state"><div class="empty-ico">🔖</div><div class="empty-msg">No bookmarks yet.<br>Tap 🔖 on any topic to save it here.</div></div>`;
  } else {
    html+=`<div class="tlist">`;
    bkm.forEach(t=>{
      const cat=CATS.find(c=>c.id===t.catId);
      html+=`<div class="titem" onclick="showTopic('${t.catId}','${t.id}')">
        <span class="titem-num" style="color:${cat?.accent}">${cat?.icon}</span>
        <div class="titem-body"><div class="titem-title">${t.title}</div><div class="titem-intro">${cat?.name}</div></div>
        <div class="titem-right"><div class="rdot ${saved[t.id]?.r?'read':'bkm'}"></div><span class="titem-arr">›</span></div>
      </div>`;
    });
    html+=`</div>`;
  }
  if(read.length){
    html+=`<div class="sec-lbl">Read Topics (${read.length})</div><div class="tlist">`;
    read.forEach(t=>{
      const cat=CATS.find(c=>c.id===t.catId);
      html+=`<div class="titem" onclick="showTopic('${t.catId}','${t.id}')">
        <span class="titem-num" style="color:${cat?.accent}">${cat?.icon}</span>
        <div class="titem-body"><div class="titem-title">${t.title}</div><div class="titem-intro">${cat?.name}</div></div>
        <div class="titem-right"><div class="rdot read"></div><span class="titem-arr">›</span></div>
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`<div class="spacer"></div>`;
  document.getElementById('screen-bookmarks').innerHTML=html;
}

// ═══════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════
// Delegated search — results render inline, input keeps focus
document.addEventListener('input', function(e) {
  if (e.target && e.target.id === 'searchInput') {
    searchQ = e.target.value.trim();
    renderHomeWithSearch(); // always stay on home screen, just swap content
  }
});
// Renders home screen with search results inline (no screen switch)
function renderHomeWithSearch() {
  if (searchQ.length === 0) {
    renderModules();
    return;
  }
  const q = searchQ.toLowerCase();
  const all = allTopics();
  const results = all.filter(t =>
    t.title.toLowerCase().includes(q) ||
    (t.intro||'').toLowerCase().includes(q) ||
    (t.concept||'').toLowerCase().includes(q) ||
    (t.rule||'').toLowerCase().includes(q) ||
    (t.explanation||'').toLowerCase().includes(q) ||
    (t.law||'').toLowerCase().includes(q)
  );
  const dynEl = document.getElementById('home-dynamic');
  if (!dynEl) return;
  let html = `<div class="search-meta-inline">${results.length} result${results.length!==1?'s':''} for <strong>"${searchQ}"</strong></div>`;
  if (!results.length) {
    html += `<div class="empty-state"><div class="empty-ico">🔍</div><div class="empty-msg">No topics found.<br>Try a different keyword.</div></div>`;
  } else {
    html += `<div class="tlist">`;
    results.forEach(t => {
      const cat = CATS.find(c => c.id === t.catId);
      html += `<div class="titem" onclick="showTopic('${t.catId}','${t.id}')">
        <span class="titem-num" style="color:${cat?.accent}">${cat?.icon}</span>
        <div class="titem-body"><div class="titem-title">${hl(t.title)}</div><div class="titem-intro">${hl(t.intro)}</div></div>
        <div class="titem-right"><div class="rdot ${saved[t.id]?.r?'read':saved[t.id]?.b?'bkm':''}"></div><span class="titem-arr">›</span></div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `<div class="spacer"></div>`;
  dynEl.innerHTML = html;
}

function renderSearch(){
  const q=searchQ.toLowerCase();
  const all=allTopics();
  const results=all.filter(t=>
    t.title.toLowerCase().includes(q)||(t.intro||'').toLowerCase().includes(q)||
    (t.concept||'').toLowerCase().includes(q)||(t.rule||'').toLowerCase().includes(q)||
    (t.explanation||'').toLowerCase().includes(q)||(t.law||'').toLowerCase().includes(q)
  );
  let html=`<div class="search-meta">${results.length} result${results.length!==1?'s':''} for <strong>"${searchQ}"</strong></div>`;
  if(!results.length){
    html+=`<div class="empty-state"><div class="empty-ico">🔍</div><div class="empty-msg">No topics found.</div></div>`;
  } else {
    html+=`<div class="tlist">`;
    results.forEach(t=>{
      const cat=CATS.find(c=>c.id===t.catId);
      html+=`<div class="titem" onclick="showTopic('${t.catId}','${t.id}')">
        <span class="titem-num" style="color:${cat?.accent}">${cat?.icon}</span>
        <div class="titem-body"><div class="titem-title">${hl(t.title)}</div><div class="titem-intro">${hl(t.intro)}</div></div>
        <div class="titem-right"><div class="rdot ${saved[t.id]?.r?'read':saved[t.id]?.b?'bkm':''}"></div><span class="titem-arr">›</span></div>
      </div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('screen-search').innerHTML=html;
}

// INIT
// ═══════════════════════════════════════════════

showHome();
</script>
</body>
</html>

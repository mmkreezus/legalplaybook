   explanation:'The downstream model (HR decides, Legal documents) creates decisions that cannot be defended. The upstream model (Legal advises on the decision before it is made) creates defensible decisions with clean documentation.',
   why:'Employment disputes are preventable. Most Industrial Court cases involve decisions that were wrong before the paperwork was issued.',
   hrbp:'Build a formal HR-Legal decision protocol: a schedule of decision types that require pre-decision legal input. This is not "legal slowing HR down" — it is building a system where decisions are made correctly the first time.',
   mistakes:["HR dismisses an employee on Friday, informs Legal on Monday to 'sort out the paperwork'","Legal reviews process compliance only — not the substantive merit of the decision"],
   scenario:"HR tells Legal: 'We\'re dismissing this employee tomorrow for misconduct. Can you review the show-cause letter?' Legal\'s response? Answer: Ask about the full DI process, what the findings were, whether the penalty is proportionate, and whether there is prior disciplinary history. Reviewing the letter without reviewing the process is inadequate.",
   law:"Industrial Relations Act 1967; Employment Act 1955",
   takeaway:"Legal's role in employment: upstream advisory, not downstream documentation. Build a pre-decision engagement protocol. The time to fix a flawed process is before the decision, not after the claim."},

  {id:'el6', title:"Employment Litigation Strategy — Settlement vs Fighting",
   intro:"Most employment disputes are commercially better settled than fought. Knowing when to settle is as important as knowing how to fight.",
   concept:"Employment litigation strategy requires a sober assessment of: the strength of the legal case, the exposure if you lose, the cost of defending, management distraction, and reputational considerations.",
   rule:"Decision framework: (1) What is the probability of winning? (2) What is the cost if we lose? (3) What is the cost of defending regardless of outcome? (4) Is there a settlement value at which both options have similar expected costs? (5) Are there non-financial reasons to fight (deterrence, principle)?",
   explanation:"Back-wage exposure is capped at 24 months, but legal fees, management time, and distraction costs are not. A case that is legally defensible may still be commercially irrational to fight.",
   why:"Litigation is not about being right. It is about achieving the best outcome at the lowest total cost. These are different objectives.",
   hrbp:"Build a litigation cost-benefit model for every significant claim: probability of winning × cost if you lose, plus defence costs regardless of outcome. Compare to the settlement value. This gives you a rational framework for the settlement decision.",
   mistakes:["Fighting cases on principle when the economics don\'t support it","Never settling because 'it sets a precedent' — precedent has a cost that must be evaluated too"],
   scenario:"A RM5,000/month employee files unfair dismissal. Legal estimates 40% chance of losing. Case would take 2 years. Defence costs: RM40,000. If lost: 24 months back wages (RM120,000) + 5 months compensation (RM25,000) = RM145,000. Expected loss value: RM58,000. Defence costs: RM40,000. Total expected cost to fight: RM98,000. Settlement offer: RM60,000. Decision? Answer: Settle. Fighting costs more on expected-value basis.",
   law:"Industrial Relations Act 1967, Section 30",
   takeaway:"Build the cost-benefit model for every significant claim. Fighting is not always right even when you might win. Settlement is not weakness — it is rational resource allocation."},
],

'compliance': [
  {id:'rc1', title:'Regulatory Compliance Frameworks',
   intro:'Every regulated business operates within multiple overlapping compliance frameworks. Understanding the architecture is the starting point.',
   concept:'A compliance framework is the system of policies, controls, monitoring, and governance that enables an organisation to meet its regulatory obligations.',
   rule:'Key elements: (1) Regulatory mapping (what applies to us?), (2) Risk assessment, (3) Policies and procedures, (4) Training and awareness, (5) Monitoring and testing, (6) Incident management, (7) Reporting.',
   explanation:'The three lines of defence model: First line (business units own compliance risk), Second line (compliance/legal provides oversight and challenge), Third line (internal audit provides independent assurance).',
   why:'Regulatory non-compliance carries fines, licence revocation, personal liability for officers, and reputational harm.',
   hrbp:'The in-house compliance lawyer\'s job is to enable the business to operate within the regulatory envelope — not to say no to everything. "Here\'s how you can do this compliantly" is more valuable than "no."',
   mistakes:['Treating compliance as a tick-box exercise rather than a risk management function','No regulatory change management process — not tracking new/amended regulations'],
   scenario:'A new regulation is gazetted affecting your industry. What is the compliance response? Answer: Impact assessment (what changes?), gap analysis (what do we do now that we shouldn\'t?), remediation plan, training, policy update, monitoring.',
   takeaway:'Compliance = regulatory mapping + risk assessment + controls + monitoring. Know what applies to you. Build controls proportionate to the risk. Monitor them.',
   diagram:`<svg viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <text x="160" y="16" text-anchor="middle" fill="#3a9494" font-size="10" font-weight="700" letter-spacing="1">THREE LINES OF DEFENCE</text>
  ${[['1st Line','Business Units\nOwn the risk','#1a2e2e'],['2nd Line','Compliance & Legal\nOversight & challenge','#1a2838'],['3rd Line','Internal Audit\nIndependent assurance','#1e1a38']].map(([l,d,bg],i)=>`
  <rect x="${6+i*104}" y="24" width="98" height="68" rx="6" fill="${bg}" stroke="#3a9494" stroke-width="${1+i*0.4}" stroke-opacity="${0.4+i*0.2}"/>
  <text x="${55+i*104}" y="48" text-anchor="middle" fill="#3a9494" font-size="10" font-weight="700">${l}</text>
  <text x="${55+i*104}" y="64" text-anchor="middle" fill="#8a92a8" font-size="8">${d.split('\n')[0]}</text>
  <text x="${55+i*104}" y="76" text-anchor="middle" fill="#8a92a8" font-size="8">${d.split('\n')[1]}</text>`).join('')}
</svg>`},
  {id:'rc2', title:"Anti-Bribery and Anti-Corruption — Section 17A MACC Act",
   intro:"Section 17A of the MACC Act 2009 imposes corporate criminal liability for bribery by 'associated persons.' The CEO going to jail is possible even without direct involvement.",
   concept:"Malaysia's corporate liability provision under Section 17A of the MACC Act 2009 (effective June 2020) makes companies criminally liable when an associated person (employee, agent, subsidiary) bribes to obtain or retain business for the company.",
   rule:"Defence: the company must prove it had 'adequate procedures' in place to prevent such conduct. Penalty: fine not less than 10× the bribe amount or RM1 million, whichever is higher. Officers can be imprisoned.",
   explanation:"'Associated persons' includes employees, agents, and subsidiaries. The company does not need to have known about or authorised the bribe. Liability is automatic unless adequate procedures are proven.",
   why:"Corruption distorts markets, harms public interest, and creates severe legal and reputational risk for any organisation operating in Malaysia.",
   hrbp:"The 'adequate procedures' defence requires: top-level commitment, risk assessment, proportionate controls, due diligence on third parties, communication and training, and monitoring/review.",
   mistakes:["No anti-bribery policy (now a criminal risk, not just a compliance gap)","Engaging third-party agents in high-risk markets without anti-bribery due diligence"],
   scenario:"An employee bribes a government official to win a contract. The company had no anti-bribery policy. Liability? Answer: Corporate criminal liability under Section 17A. No adequate procedures defence available. Fine and potential director imprisonment.",
   law:"Malaysian Anti-Corruption Commission Act 2009, Section 17A",
   takeaway:"Section 17A = corporate liability for associated person bribery. Defence = adequate procedures. Build the 6-pillar adequate procedures programme. This is criminal, not administrative."},

  {id:'rc3', title:"Competition Law — Basics of the Competition Act 2010",
   intro:"Price-fixing, market allocation, and abuse of dominance are not just unethical — they are criminal in Malaysia.",
   concept:"Malaysia's Competition Act 2010 prohibits: (1) anti-competitive agreements (horizontal and vertical), (2) abuse of dominant position.",
   rule:"Anti-competitive agreements: price-fixing, bid-rigging, market allocation, and output restriction are per se prohibited (no need to prove harm). Dominant position abuse: excessive pricing, predatory pricing, tied selling — prohibited when they harm competition.",
   explanation:"The Malaysia Competition Commission (MyCC) has powers to investigate, impose fines, and seek criminal prosecution. Fines: up to 10% of worldwide turnover for each year of infringement.",
   why:"Competition law protects consumers and fair markets by preventing anti-competitive coordination and abuse of market power.",
   hrbp:"Commercial team risk: bid-rigging (coordinating bids with competitors) is a per se violation. In-house counsel must train commercial and procurement teams on what discussions with competitors are and are not permissible.",
   mistakes:["Commercial team discussing prices with competitors at industry association meetings","Tender team coordinating cover bids — this is bid-rigging, a serious criminal offence"],
   scenario:"Two competitors meet at an industry dinner and discuss pricing strategies for the next quarter. Is this a violation? Answer: Potentially yes — discussing pricing with competitors, even informally, may constitute a cartel. Withdraw from the discussion and document that you did.",
   law:"Competition Act 2010; Competition Commission Act 2010",
   takeaway:"Price-fixing, bid-rigging, and market allocation = criminal offences. Train commercial teams. Create a 'no-discuss' policy on pricing with competitors. Exit any conversation that touches on pricing."},

  {id:'rc4', title:"Sanctions Compliance for Non-Financial Sector",
   intro:"Sanctions are not only a banking problem. Any business conducting international transactions has sanctions exposure.",
   concept:"Sanctions are legal restrictions on dealings with specific countries, individuals, or entities. They are imposed by UNSC, US, EU, and UK, among others. Malaysia implements them through AMLA 2001 and domestic legislation.",
   rule:"Key obligations: screen counterparties against sanctions lists before any transaction, avoid facilitating sanctions evasion, and maintain records. Secondary sanctions (US) can apply to non-US entities that deal with US-sanctioned parties.",
   explanation:"The consequences of sanctions violations are severe: loss of ability to transact in USD (devastating for international trade), fines, and reputational destruction. This is not a theoretical risk for companies with international operations.",
   why:"Sanctions violations can effectively cut a business off from the global financial system. The risk is existential for export-dependent businesses.",
   hrbp:"Build a sanctions screening programme for any international-facing business: screen new counterparties, screen periodically, have an escalation process for matches, and never process a sanctioned transaction.",
   mistakes:["Assuming sanctions screening is only a bank's obligation","No process for responding to a sanctions alert — discovering the issue but proceeding anyway"],
   scenario:"You are reviewing a proposed supply agreement with an Iranian entity. What do you check? Answer: US OFAC SDN list (Iran is comprehensively sanctioned), EU and UK lists, UNSC lists. Even non-US companies face secondary sanctions risk for Iran dealings.",
   law:"AMLA 2001; UNSC Resolutions; OFAC regulations (extraterritorial)",
   takeaway:"Sanctions are not just a banking issue. Screen all international counterparties. Build an escalation process. Never process transactions with sanctioned parties."},
  {id:'rc5', title:"Governance of Compliance Function",
   intro:"The compliance function must be independent enough to say no, well-resourced enough to be effective, and well-positioned enough to be heard.",
   concept:"Compliance governance addresses: where does compliance sit in the organisational structure (independence), reporting lines (Board/audit committee vs CEO), resources (people, technology, budget), and accountability (who is responsible for what).",
   rule:"Best practice: compliance reports to the Board/Audit Committee directly (for regulated entities), not only to the CEO. This protects independence. The CCO or GC should have direct access to the Board without management gatekeeping.",
   explanation:"The 'too cosy' risk: a compliance function that reports exclusively to the business it is supposed to oversee has a structural independence problem. When compliance has to say no to the CEO's pet project, the reporting line determines whether that no is heard.",
   why:"Independent compliance oversight is the mechanism by which the Board exercises its governance responsibility over regulatory risk.",
   hrbp:"For regulated entities: the compliance function should report to the Board Risk/Audit Committee independently of management. The CCO or in-house GC should attend Board meetings on compliance matters.",
   mistakes:["Compliance function that only reports to the CEO — independence is structural, not just cultural","No direct escalation path to the Board for compliance concerns — serious issues may be buried"],
   scenario:"The CEO instructs the CCO not to report a potential regulatory breach to the Board, saying 'we\'ll handle it internally.' What is the CCO\'s obligation? Answer: Report to the Board directly. The CEO cannot instruct the CCO to withhold material regulatory risk from the Board. This is precisely why the independent reporting line exists.",
   law:"Companies Act 2016 (directors\' duties); sector-specific regulatory obligations; Corporate Governance Code",
   takeaway:"Compliance independence is structural. Direct Board reporting line for regulated entities. CCO must be able to report material issues to the Board without management gatekeeping. This is governance, not politics."},
  {id:'rc6', title:"Whistleblower Hotlines and Investigation Protocols",
   intro:"A whistleblower hotline that goes nowhere is worse than no hotline. It creates expectations that are then betrayed.",
   concept:"An effective whistleblower programme has three components: a secure reporting mechanism, an investigation process, and a non-retaliation commitment that is demonstrably enforced.",
   rule:"Effective reporting mechanisms: anonymous channel (third-party managed), multiple reporting options (hotline, email, web form, in-person), clear scope (what can be reported), and clear process (what happens after a report is made).",
   explanation:"The credibility problem: if employees believe reports go nowhere, or that reporters get punished, the hotline will not be used — except by malicious reporters. Building credibility requires publicising outcomes (appropriately anonymised) to demonstrate the programme works.",
   why:"Regulators increasingly expect evidence of a functioning whistleblower programme, not just a policy. A hotline that receives no reports after 3 years is a programme that has failed, not a clean organisation.",
   hrbp:"Track: number of reports, categories, investigation outcomes, and time to resolution. Report to the Audit Committee or Board quarterly. If reports are zero, investigate whether the programme is trusted — not whether there is misconduct.",
   mistakes:["Hotline managed internally with no anonymity guarantee — employees fear identification","No communication of outcomes — employees never know what happened to complaints, destroying trust in the system"],
   scenario:"A company implements a whistleblower hotline. In the first year: 0 reports. Is this good news? Answer: Almost certainly not. Benchmark: most active programmes receive 1-3 reports per 100 employees per year. Zero reports typically signals that employees don\'t trust the channel or don\'t know it exists.",
   law:"Whistleblower Protection Act 2010; MACC Act 2009; Corporate Governance Code",
   takeaway:"Zero reports = programme failure, not clean organisation. Anonymous channel. Third-party management. Published outcomes. Publicise the programme actively. Report to Audit Committee."},
],

'ip': [
  {id:'ip1', title:"Intellectual Property — What You Can Protect",
   intro:'IP protection is a business strategy, not just a legal formality.',
   concept:'The four main IP rights: Copyright, Trademarks, Patents, and Trade Secrets. Each protects a different type of valuable asset.',
   rule:'Copyright: automatic (no registration required in Malaysia); Trademark: registration required for strongest protection; Patent: registration required, protects inventions; Trade Secrets: contractual protection through confidentiality obligations.',
   explanation:'Copyright in Malaysia subsists automatically upon creation for 50 years (life + 50 for works). Trademarks must be registered with MyIPO. Patents protect novel, inventive, and industrially applicable inventions for 20 years.',
   why:'Unprotected IP can be used, copied, or registered by competitors. A proactive IP strategy creates barriers to competition.',
   hrbp:'When a company commissions work from freelancers or agencies — who owns the copyright? By default, the creator owns it unless there is a written assignment.',
   mistakes:['Assuming copyright ownership because you paid for the work (commissioned work without assignment)','No IP assignment clause in employment contracts — employees may technically own IP they create'],
   scenario:'Company hires an agency to design a logo. No IP clause. Who owns the copyright? Answer: The agency, unless there is a written assignment. Get IP assignment clauses in every creative service agreement.',
   law:'Copyright Act 1987; Trade Marks Act 2019; Patents Act 1983',
   takeaway:'Know what you have. Register what can be registered. Assign what you commissioned. Protect trade secrets through confidentiality and access controls.'},

  {id:'ip2', title:'Protecting Trade Secrets and Confidential Information',
   intro:'Trade secrets are often more valuable than registered IP — and they have no expiry date.',
   concept:'Trade secrets are valuable business information kept confidential, protected by law against misappropriation.',
   rule:'Protection requires: (1) the information is secret, (2) it has commercial value by virtue of being secret, (3) reasonable steps have been taken to keep it secret.',
   explanation:'Unlike patents, trade secrets have no registration, no disclosure, and no expiry. But they require active protection: confidentiality agreements, access controls, and clear policies.',
   why:'Departing employees and third parties who misappropriate confidential information can be sued, but you must be able to prove what was secret and what steps you took to protect it.',
   hrbp:'Build a trade secret protection programme: classify information, restrict access on need-to-know basis, require NDAs for all third parties, conduct exit interviews focused on IP.',
   mistakes:['No confidentiality markings on sensitive documents','NDAs with no specificity — "confidential information means everything" is too broad and may not be enforceable'],
   scenario:'A departing senior employee takes a client database. Legal remedy? Answer: Breach of confidence, potentially breach of employment contract. Seek injunction immediately. Evidence preservation is urgent.',
   law:'Tort of Breach of Confidence (common law); Employment Act 1955; Intellectual Property Corporation of Malaysia',
   takeaway:'Identify. Classify. Restrict. Require NDAs. Monitor. React swiftly. Trade secrets are lost through inaction more often than deliberate theft.'},
  {id:'ip3', title:"Copyright — What It Protects and What It Doesn't",
   intro:"Copyright protects expression, not ideas. This distinction matters enormously.",
   concept:"Copyright in Malaysia protects original literary, artistic, musical, dramatic works, films, sound recordings, and broadcasts. It subsists automatically — no registration required.",
   rule:"What copyright protects: the specific expression of an idea. What it does NOT protect: ideas, facts, methods, principles, or information. Duration: life of the author + 50 years.",
   explanation:"The idea-expression dichotomy: 'a social media app for businesses' is an idea (not protected). The specific code, interface design, and copy of that app is expression (protected). Competitors can build the same app but must create their own expression.",
   why:"Copyright creates economic incentives for creative work while allowing ideas to remain in the public domain for further development.",
   hrbp:"Software copyright: the code is protected, not the functionality. Competitors can reverse-engineer functionality and rewrite the code. Software companies protect functionality through trade secrets and technical barriers, not just copyright.",
   mistakes:["Assuming copyright protects the concept behind a product or business model","Not retaining evidence of creation (timestamps, development records) to prove authorship in disputes"],
   scenario:"A competitor launches an app with very similar functionality to yours but different code and design. Copyright infringement? Answer: No — copyright protects expression, not functionality. If the code is independently written, there is no copyright issue.",
   law:"Copyright Act 1987; Berne Convention",
   takeaway:"Copyright = expression. Ideas are free. Register what can be registered (trademarks, patents). Protect what cannot be registered (trade secrets, code) through contracts and access controls."},

  {id:'ip4', title:"Trade Marks — Registration and Enforcement",
   intro:"An unregistered trade mark has some common law protection. A registered one has statutory rights and is vastly easier to enforce.",
   concept:"A trade mark identifies the commercial origin of goods or services. Registration provides statutory rights, national/international protection, and easier enforcement.",
   rule:"Registration with MyIPO (Intellectual Property Corporation of Malaysia). Classes: goods and services are divided into 45 classes — register in each relevant class. Duration: 10 years, renewable indefinitely.",
   explanation:"Use it or lose it: non-use for 3 consecutive years exposes a registered mark to removal proceedings. The registrant must be able to demonstrate use.",
   why:"Registered trade marks are commercially valuable assets. They can be licensed, assigned, and used as security. They prevent others from trading on your reputation.",
   hrbp:"Domain name ≠ trade mark. Registering ABC.com does not give you trade mark rights in 'ABC.' Register the trade mark separately, in each relevant jurisdiction.",
   mistakes:["Operating for years under an unregistered mark and then discovering someone else has registered it","Not filing in key markets where you intend to operate — trade marks are territorial"],
   scenario:"You have operated as 'Nexus Solutions' for 5 years in Malaysia without registering. A competitor in Singapore has just registered the same name as a trade mark in Malaysia. Options? Answer: Challenge the registration on grounds of prior use (common law passing off), but this is costly and uncertain. Prevention: register early.",
   law:"Trade Marks Act 2019 (replaces Trade Marks Act 1976)",
   takeaway:"Register trade marks early, in each relevant jurisdiction, in each relevant class. Register the mark you actually use in commerce. Use it continuously to preserve the registration."},
  {id:'ip5', title:"IP Due Diligence in M&A",
   intro:"IP assets are often the primary value driver in technology, media, and brand acquisitions. IP due diligence is not optional.",
   concept:"IP due diligence in M&A identifies: what IP the target owns (vs licenses), whether the IP is properly registered and maintained, whether employees and contractors have validly assigned their IP, and whether there are any third-party IP claims.",
   rule:"IP DD checklist: ownership chain (created by employees/contractors with valid assignment), registration status (trade marks, patents — are they current?), licences (what IP has been licensed in and out, on what terms?), infringement claims (any pending or threatened?), open source compliance (software using GPL may have contamination issues).",
   explanation:"The silent IP killer in tech acquisitions: open source contamination. If the software uses GPL-licensed open source code, the GPL licence may require the entire codebase to be open sourced. This can destroy the value of a software asset.",
   why:"You cannot sell what you do not own. IP acquired through M&A may come with undisclosed claims, licensing encumbrances, or ownership defects that destroy value post-completion.",
   hrbp:"Build an IP ownership register for your organisation now — not during a sale process. Document: what IP exists, who created it (employed or contracted), assignment status, registration details, and renewal dates.",
   mistakes:["Assuming the target company owns all software because employees wrote it — without checking assignment provisions in employment contracts","No open source software policy — GPL contamination discovered after the acquisition closes"],
   scenario:"A tech startup is being acquired. Due diligence reveals the core product uses significant open-source code under a GPL licence. What is the risk? Answer: The GPL may require the acquirer to open-source the entire product under GPL terms. This can make the acquisition commercially worthless. Deal-breaker if unaddressed.",
   law:"Copyright Act 1987; Patents Act 1983; open source licence terms (GPL, MIT, Apache)",
   takeaway:"IP DD is existential in tech and brand acquisitions. Ownership chain + registration status + licence terms + open source audit. Build an IP register now so you are not creating it under M&A pressure."},
  {id:'ip6', title:"Licensing IP — Key Terms and Risk Areas",
   intro:"An IP licence that does not specify its scope precisely gives away more than was intended — or less than was needed.",
   concept:"An IP licence grants permission to use IP owned by another (the licensor) within defined parameters. The scope of the licence determines exactly what the licensee can do.",
   rule:"Key licence parameters: (1) Scope of use (what can you do with the IP?), (2) Exclusivity (sole licence vs exclusive vs non-exclusive), (3) Territory (geographic scope), (4) Duration (perpetual vs fixed term), (5) Sub-licensing (can the licensee grant sub-licences?), (6) Royalties and payment terms.",
   explanation:"Exclusive vs sole licence: an exclusive licence means only the licensee can use the IP (licensor cannot use it in the licensed territory either). A sole licence means the licensee has exclusive rights but the licensor can still use the IP. Most commercial licensees want exclusive; most licensors prefer sole.",
   why:"An inadequately scoped licence creates disputes about what the licensee is permitted to do. Either the licensor cannot control how their IP is used, or the licensee cannot do what they expected.",
   hrbp:"When reviewing an IP licence agreement: confirm the scope of permitted use is as broad as your business requires. A software licence that allows 'internal use only' does not permit reselling the output to clients.",
   mistakes:["Licensing technology for 'internal use' and then embedding it in client products — scope violation","No sub-licensing right negotiated when the business model requires sub-licensing to clients"],
   scenario:"A company licences a software platform for internal HR use. It then builds an HR analytics product for sale to clients using the platform\'s data processing capabilities. The licence says 'internal use only\'. Issue? Answer: Material scope violation. The licence must be renegotiated to include commercial use rights before the product launches.",
   law:"Copyright Act 1987; Patents Act 1983; Contracts Act 1950",
   takeaway:"IP licence scope must match the actual use case. Internal use ≠ commercial use. Exclusive ≠ sole. Sub-licensing rights must be explicit. Read the scope of use clause first — everything else in the licence is secondary."},
],

'data': [
  {id:'dp1', title:'Personal Data Protection Act (PDPA) — Core Framework',
   intro:'Every Malaysian business that processes personal data must comply with the PDPA. Non-compliance is a criminal offence.',
   concept:'The Personal Data Protection Act 2010 (PDPA) governs the processing of personal data in commercial transactions.',
   rule:'Seven principles: General, Notice & Choice, Disclosure, Security, Retention, Data Integrity, Access.',
   explanation:'General Principle: personal data may only be processed with the data subject\'s consent OR under a permitted purpose. Data must not be processed beyond what is needed (data minimisation).',
   why:'Personal data has real value and real risk. Breaches cause harm to individuals and significant regulatory risk to organisations.',
   hrbp:'PDPA applies to personal data processed in commercial transactions. This means customer data, employee data in HR systems, and third-party personal data you handle.',
   mistakes:['Collecting more data than needed (violates minimisation)','No privacy notice served to data subjects before collection'],
   scenario:'A company wants to share customer data with a marketing partner. What PDPA requirements apply? Answer: Notice and Choice Principle — customers must have been informed at collection that data may be shared with third parties, and must not have opted out.',
   law:'Personal Data Protection Act 2010; Personal Data Protection Regulations 2013',
   takeaway:'Seven principles — know them. Consent is not the only lawful basis, but it is the most common. Data minimisation, notice, and security are non-negotiable.',
   diagram:`<svg viewBox="0 0 320 110" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <text x="160" y="16" text-anchor="middle" fill="#4878c8" font-size="10" font-weight="700" letter-spacing="1">PDPA 7 PRINCIPLES</text>
  ${['General','Notice & Choice','Disclosure','Security','Retention','Data Integrity','Access'].map((p,i)=>`
  <rect x="${6+(i%4)*78}" y="${24+Math.floor(i/4)*34}" width="70" height="26" rx="5" fill="#121520" stroke="#4878c8" stroke-width="0.8" stroke-opacity="${0.5+i*0.07}"/>
  <text x="${41+(i%4)*78}" y="${41+Math.floor(i/4)*34}" text-anchor="middle" fill="#7aa8f0" font-size="8.5" font-weight="600">${p}</text>`).join('')}
</svg>`},

  {id:'dp2', title:'Data Breach Response — What To Do in the First 72 Hours',
   intro:'How you respond to a data breach in the first 72 hours determines your legal exposure and reputational damage.',
   concept:'A data breach is any incident leading to accidental or unlawful destruction, loss, alteration, unauthorised disclosure of, or access to, personal data.',
   rule:'Immediate steps: (1) Contain (stop the bleeding), (2) Assess (scope and nature), (3) Notify (regulator and/or affected individuals), (4) Investigate (root cause), (5) Remediate.',
   explanation:'Malaysia\'s PDPA currently has no mandatory breach notification obligation (as of 2024), but the proposed PDPA amendments will introduce notification requirements. GDPR (if applicable) requires 72-hour regulatory notification.',
   why:'A slow or inadequate breach response amplifies legal exposure, regulatory penalties, and reputational damage.',
   hrbp:'Build a data breach response plan before you need it. Assign roles. Document the decision framework. Practice it with a tabletop exercise.',
   mistakes:['Delaying notification to "assess the situation" beyond what is reasonable','Not preserving evidence — breach response and forensics must be coordinated'],
   scenario:'An employee\'s laptop containing customer data is stolen. What are the first three actions? Answer: (1) Contain — remote wipe if possible; (2) Assess — what data, whose data, was it encrypted; (3) Notify management and legal immediately.',
   law:'Personal Data Protection Act 2010; GDPR (where applicable)',
   takeaway:'Contain. Assess. Notify. Investigate. Remediate. In that order. Have a plan before you need it. Speed matters enormously.'},
  {id:'dp3', title:"Privacy by Design — Building Compliance In",
   intro:"It is far cheaper to build privacy into a system than to retrofit it after deployment.",
   concept:"Privacy by Design (PbD) is the principle that data protection must be considered from the outset of any project, system, or process that involves personal data — not added as an afterthought.",
   rule:"7 principles of Privacy by Design: (1) Proactive not reactive, (2) Privacy as default, (3) Privacy embedded into design, (4) Full functionality, (5) End-to-end security, (6) Visibility and transparency, (7) Respect for user privacy.",
   explanation:"Privacy impact assessment (PIA): before launching any new product or process involving personal data, conduct a structured assessment of privacy risks and mitigations. This is increasingly mandated in international frameworks and reflects best practice.",
   why:"Retrofitting privacy into deployed systems is exponentially more expensive than building it in. Regulators worldwide are moving toward mandating PbD.",
   hrbp:"Every new IT system, every new product feature, every new data collection initiative should have a PIA. Build this into the product development lifecycle, not as a legal review at the end.",
   mistakes:["Collecting all available data 'just in case' — collecting data you don't need creates liability without benefit","Privacy review only at the contract stage, not at the design stage"],
   scenario:"A product team wants to track detailed user behaviour including location data to improve the app. Privacy response? Answer: Conduct a PIA. Determine what data is actually necessary for the stated purpose. Apply data minimisation — collect only what is needed.",
   law:"Personal Data Protection Act 2010; GDPR (where applicable); MyData Guidelines",
   takeaway:"PIA before launch. Data minimisation by default. Privacy embedded in design, not bolted on at the end. Collecting data you don't need creates liability you don't need."},

  {id:'dp4', title:"Cross-Border Data Transfer — The Rules",
   intro:"Sending personal data outside Malaysia is subject to specific PDPA restrictions that many organisations routinely violate.",
   concept:"PDPA Section 129: personal data must not be transferred to a place outside Malaysia except to countries specified in a gazette, or where conditions of adequacy or consent are met.",
   rule:"Transfer is permitted if: (1) the destination country is specified in the gazette (as having adequate protection), (2) the data subject has consented, (3) the transfer is necessary for contract performance, or (4) the data processor outside Malaysia has agreed to comply with PDPA standards.",
   explanation:"Cloud computing is a de facto cross-border data transfer if servers are outside Malaysia. Most cloud providers are outside Malaysia. This means most Malaysian businesses are conducting cross-border transfers — many without the required safeguards.",
   why:"Cross-border data transfer restrictions protect personal data from being moved to jurisdictions with weaker privacy laws.",
   hrbp:"Conduct a data mapping exercise: where does your personal data go? Identify every cloud system, SaaS platform, and service provider. For those outside Malaysia, apply the appropriate transfer safeguard.",
   mistakes:["Assuming cloud hosting in Singapore or the US is automatically compliant","No data processing agreements with overseas processors"],
   scenario:"Your HR system is hosted on AWS servers in Singapore. Is this a PDPA cross-border transfer issue? Answer: Yes. Require a data processing agreement with AWS that commits to PDPA-equivalent standards. Review PDPA Section 129 compliance.",
   law:"Personal Data Protection Act 2010, Section 129",
   takeaway:"Data mapping first. Every overseas system = cross-border transfer. Apply consent, adequacy, or contractual safeguards. Data processing agreements with all overseas processors are non-negotiable."},
  {id:'dp5', title:"Employee Data and HR Systems — PDPA Compliance",
   intro:"HR holds some of the most sensitive personal data in any organisation. PDPA compliance in HR is not optional.",
   concept:"HR systems contain: names, IC numbers, bank details, salary information, medical records (sick leave), disciplinary records, performance data, and family information. This is sensitive personal data with heightened protection obligations.",
   rule:"HR data obligations: collect only what is necessary, serve a privacy notice to employees (informing them what data is collected and how it will be used), restrict access on need-to-know basis, maintain accurate data, and implement security measures proportionate to sensitivity.",
   explanation:"Employee data processing for legitimate HR purposes (payroll, performance, compliance) does not require individual consent — it is covered by the contractual necessity basis. However, sharing employee data with third parties (insurers, recruitment firms, background check companies) requires appropriate authorisation.",
   why:"Employees have the right to expect their personal data is handled carefully. HR data breaches cause significant personal harm and employer liability.",
   hrbp:"Conduct an HR data audit: what data is collected at each stage (application, onboarding, employment, exit)? Who has access? How long is it retained? Is there a privacy notice? Audit against these four questions.",
   mistakes:["No privacy notice provided to employees at the point of data collection","HR sharing employee data with external parties (recruitment firms, insurance companies) without appropriate authorisation"],
   scenario:"A manager asks HR to share a former employee's personal details with a debt collection agency. What is HR's obligation? Answer: Do not share without legal basis. The former employee's personal data cannot be shared with a third party without their consent or a legal basis. Refer the debt collector to the former employee directly.",
   law:"Personal Data Protection Act 2010; PDPA Regulations 2013",
   takeaway:"HR data requires: privacy notice, minimum collection, access restriction, accuracy maintenance, security measures. Never share employee data with third parties without legal basis. Audit annually."},

  {id:'dp6', title:"GDPR Applicability for Malaysian Businesses",
   intro:"If your business processes data of EU residents, GDPR may apply to you — even if you are based entirely in Malaysia.",
   concept:"The EU General Data Protection Regulation (GDPR) has extraterritorial reach: it applies to any organisation that processes personal data of EU residents, regardless of where the organisation is located.",
   rule:"GDPR applicability: (1) You offer goods/services to EU residents, or (2) You monitor the behaviour of EU residents. If either applies, GDPR obligations apply to that data processing.",
   explanation:"Practical scope: a Malaysian e-commerce platform selling to EU customers must comply with GDPR for those customers' data. A Malaysian company processing EU employee data must comply. The PDPA alone is insufficient where GDPR applies.",
   why:"GDPR fines can be enormous (up to 4% of global annual turnover). EU regulators actively enforce against non-EU companies.",
   hrbp:"Map your data flows: do you process data of EU residents anywhere in your business? If yes, identify the specific GDPR obligations that apply to that processing and implement a GDPR compliance layer on top of your PDPA baseline.",
   mistakes:["Assuming PDPA compliance covers GDPR obligations (it does not — GDPR is more stringent in many areas)","No cookie consent mechanism on websites accessed by EU users — a basic but commonly missed GDPR requirement"],
   scenario:"A Malaysian SaaS company has 200 EU business customers. Their employees' data is processed through the platform. Does GDPR apply? Answer: Yes — the SaaS company is a 'data processor' under GDPR. It must: enter GDPR-compliant data processing agreements with each EU customer, implement appropriate security measures, and comply with data subject rights requests.",
   law:"EU General Data Protection Regulation 2016/679; Personal Data Protection Act 2010",
   takeaway:"GDPR applies to processing of EU resident data regardless of where you are. Identify EU data processing. Implement GDPR-compliant controls for that processing. PDPA compliance does not satisfy GDPR."},
  {id:'dp7', title:"Consent Under PDPA — When It Is and Is Not Required",
   intro:"Consent is not the only lawful basis under PDPA — and relying on it for everything creates practical compliance problems.",
   concept:"PDPA permits processing of personal data on multiple grounds, not only consent. The grounds are: (1) consent, (2) contract performance, (3) legal obligation compliance, (4) vital interests protection, (5) public functions, (6) legitimate interests.",
   rule:"Contract performance: processing necessary to perform a contract with the data subject (e.g., payroll processing for employee data) does not require consent — the contract itself provides the basis. Legal obligation: processing required by law (e.g., EPF reporting) does not require consent.",
   explanation:"The consent trap: organisations that rely on consent for everything face a practical problem — consent can be withdrawn. If processing is genuinely necessary for contract performance or legal compliance, consent withdrawal should not stop the processing. Use the right basis.",
   why:"Using the wrong legal basis creates both compliance risk (processing without valid basis) and operational risk (consent withdrawal disrupts necessary processing).",
   hrbp:"Conduct a data mapping exercise that identifies the legal basis for each processing activity, not just whether consent has been obtained. For employee data: most HR processing is contract performance or legal obligation — not consent.",
   mistakes:["Relying on employee consent for payroll processing — consent withdrawal could theoretically prevent payroll","Seeking consent for all marketing communications without considering whether legitimate interest applies"],
   scenario:"An employee withdraws consent to HR processing their personal data. Is the company obliged to stop all processing? Answer: No — most HR data processing is on the basis of contract performance and legal obligation, not consent. Identify the correct basis for each processing activity. Only processing genuinely based on consent stops.",
   law:"Personal Data Protection Act 2010; PDPA Regulations 2013",
   takeaway:"PDPA has 6 legal bases. Match each processing activity to the correct basis. Employment processing is mostly contract performance and legal obligation — not consent. Map your bases before relying on consent for everything."},
],

'disputes': [
  {id:'dr1', title:'Litigation vs Arbitration vs Mediation',
   intro:'The right dispute resolution mechanism depends on the relationship, the value, the timeline, and the desired outcome.',
   concept:'Three primary dispute resolution mechanisms: court litigation (public, binding, appellable), arbitration (private, binding, limited appeal), and mediation (confidential, non-binding, relationship-preserving).',
   rule:'Arbitration requires an arbitration agreement (usually a clause in the underlying contract). Mediation is voluntary. Litigation is available to all.',
   explanation:'Arbitration advantages: confidentiality, party-appointed arbitrators, international enforceability (New York Convention), finality. Disadvantages: expensive, no precedent value.',
   why:'Choosing the wrong dispute resolution mechanism is costly. Build in the right clause at contract stage.',
   hrbp:'International contracts should almost always use arbitration — court judgments are difficult to enforce cross-border. Domestic commercial disputes can go to court or arbitration.',
   mistakes:['No dispute resolution clause in the contract — defaults to Malaysian courts','Drafting an arbitration clause without specifying the institution, seat, language, and number of arbitrators'],
   scenario:'Contract has no dispute resolution clause. Client in Singapore refuses to pay. How do you recover? Answer: Malaysian court proceedings, then enforcement in Singapore — complex and expensive. Prevention: always include an arbitration clause in cross-border contracts.',
   law:'Arbitration Act 2005; Civil Procedure Rules; Mediation Act 2012',
   takeaway:'Draft the dispute resolution clause before you need it. For international contracts: arbitration. Specify institution, seat, language, arbitrator number. Never leave this blank.',
   diagram:`<svg viewBox="0 0 320 90" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <text x="160" y="16" text-anchor="middle" fill="#7aa8f0" font-size="10" font-weight="700" letter-spacing="1">DISPUTE RESOLUTION OPTIONS</text>
  ${[['Litigation','Public · Binding · Appellable','Slow, expensive','#4878c8'],['Arbitration','Private · Binding · Limited appeal','Flexible, costly','#7a58a8'],['Mediation','Confidential · Non-binding','Fast, relationship-preserving','#4a9468']].map(([t,d,p,c],i)=>`

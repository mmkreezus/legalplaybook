  <text x="${55+i*104}" y="57" text-anchor="middle" fill="#8a92a8" font-size="7.5">${d}</text>
  <text x="${55+i*104}" y="70" text-anchor="middle" fill="#525870" font-size="7.5">${p}</text>`).join('')}
</svg>`},

  {id:'dr2', title:'Litigation Strategy — Managing a Case from the Inside',
   intro:'The in-house lawyer managing litigation must balance legal merit, commercial objectives, and reputational risk.',
   concept:'Litigation management involves: selecting external counsel, defining the litigation strategy, managing costs, and maintaining settlement optionality.',
   rule:'Key decision points: (1) Issue / defend, (2) Interim relief, (3) Discovery and disclosure, (4) Expert evidence, (5) Settlement windows, (6) Trial preparation.',
   explanation:'Settlement should be evaluated at every stage. The litigation budget should be compared to the expected outcome (discounted by probability of success). Cases that are legally strong can still be commercially irrational to pursue.',
   why:'Litigation is expensive, distracting, and uncertain. Managing it strategically maximises value.',
   hrbp:'Build a litigation register — track all live matters, external counsel, estimated exposure, costs, and next steps. Report to board on significant matters.',
   mistakes:['Fighting a case because it\'s "the principle" when the economics don\'t support it','Not exploring settlement when the cost of litigation exceeds the claim value'],
   scenario:'External counsel quotes RM500,000 to litigate a RM400,000 claim. What do you advise? Answer: Economically irrational. Recommend settlement or mediation. The legal right to proceed does not mean you should.',
   takeaway:'Litigation is a business decision, not just a legal one. Quantify the options. Preserve settlement optionality. Control costs. File a litigation register.'},
  {id:'dr3', title:"Evidence and Disclosure — What You Must Produce",
   intro:"Disclosure of documents in Malaysian litigation is a structured obligation. Knowing what must be disclosed — and what is protected — is essential.",
   concept:"Discovery (disclosure) in Malaysian civil litigation: parties must disclose all documents relevant to the matters in dispute that are or have been in their possession, custody, or power.",
   rule:"Automatic discovery (O.24 Rules of Court 2012): standard discovery by both parties. Specific discovery: application for specific document production. Protected from disclosure: legally privileged documents, without prejudice communications, public interest immunity.",
   explanation:"'Documents' includes emails, WhatsApp messages, spreadsheets, and all electronic communications. Deleting documents after a dispute arises can be contempt of court.",
   why:"Disclosure ensures both parties have access to the full evidential picture, promoting fair resolution.",
   hrbp:"Document retention policy: all organisations should have one. When a dispute arises (or is anticipated), issue a legal hold notice to preserve all relevant documents. Failure to preserve = spoliation risk.",
   mistakes:["Deleting emails or documents after a dispute arises or is anticipated","Not issuing legal hold notices when a dispute becomes foreseeable"],
   scenario:"HR receives an unfair dismissal claim. The compliance officer deletes disciplinary files that show process gaps. Consequence? Answer: Spoliation. Courts can draw adverse inferences. This can convert a winnable case into an indefensible one.",
   law:"Rules of Court 2012, Order 24; Evidence Act 1950",
   takeaway:"Preserve everything once a dispute is foreseeable. Issue legal hold notices. 'Without prejudice' labels protect settlement discussions. Privilege protects legal advice. Delete nothing."},

  {id:'dr4', title:"Debt Recovery — From Demand to Judgment",
   intro:"Recovering a debt requires following the correct legal process. Cutting corners can void your claim.",
   concept:"Debt recovery in Malaysia follows a structured process: formal demand → filing → service → judgment → enforcement.",
   rule:"Process: (1) Letter of demand (specified notice period), (2) Filing in the appropriate court (Magistrate ≤RM100k, Sessions ≤RM1m, High Court > RM1m), (3) Writ/Originating Summons served, (4) Default judgment if no response, (5) Enforcement (writ of execution, garnishment).",
   explanation:"Limitation period: 6 years for contract claims (Limitation Act 1953). A claim brought after 6 years from the date the cause of action accrued is time-barred.",
   why:"Without a structured recovery process, creditors cannot enforce their legal rights. The process balances creditor rights with debtor due process.",
   hrbp:"In-house counsel managing commercial disputes: calendar all limitation dates for all pending claims. A missed limitation period extinguishes the legal right to claim, regardless of the merits.",
   mistakes:["Filing in the wrong court (claim struck out for lack of jurisdiction)","Not tracking the 6-year limitation period — losing a valid claim due to delay"],
   scenario:"A supplier owes you RM250,000 and has ignored payment demands for 2 years. You have delayed action. How much time remains? Answer: 6 years from default — calculate the exact date. If it is approaching, file immediately before the limitation period expires.",
   law:"Limitation Act 1953; Rules of Court 2012",
   takeaway:"Letter of demand → appropriate court → service → judgment → enforcement. Track limitation dates for every potential claim. File before 6 years from the cause of action."},
  {id:'dr5', title:"Expert Witnesses — Using Technical Evidence in Disputes",
   intro:"A dispute about technical, financial, or industry-specific matters often turns on expert evidence. Understanding how to use it is essential.",
   concept:"Expert witnesses provide independent opinions on technical matters within their expertise that are beyond the court's ordinary knowledge. They differ from fact witnesses (who testify about what happened) by providing opinions.",
   rule:"Requirements for expert evidence in Malaysia: the witness must be expert in the relevant field, the opinion must be within their expertise, they must be independent (not an advocate for the party calling them), and their report must explain their methodology.",
   explanation:"The expert's duty is to the court, not the party instructing them. An expert who tailors their report to favour the instructing party (a 'hired gun') is professionally exposed and their evidence will be discounted.",
   why:"Complex commercial disputes cannot be resolved without technical evidence on valuation, industry practice, technical failure, or financial analysis. Selecting the right expert is a critical litigation decision.",
   hrbp:"When briefing an expert: provide the factual scenario, ask for their independent professional opinion, make clear they may be cross-examined, and do not tell them what conclusion you want. Their credibility is their value — undermine it and their evidence is worthless.",
   mistakes:["Selecting an expert based on willingness to say what you want rather than genuine expertise","Not disclosing the expert report to the other side in accordance with court rules — triggers sanctions"],
   scenario:"A construction dispute requires expert evidence on whether the contractor's delay was caused by the employer's design changes. What type of expert do you need? Answer: A construction expert (quantity surveyor or project manager) who can independently assess the facts and provide an opinion on causation. Their report must be disclosed.",
   law:"Rules of Court 2012, Order 40A (expert witnesses); Evidence Act 1950",
   takeaway:"Experts: independent, in-field, methodologically rigorous. Duty to court, not to client. Disclose the report. Selecting an expert for willingness to agree is the fastest route to discredited evidence."},
  {id:'dr6', title:"Enforcement of Judgments — Winning in Court Is Only Half the Battle",
   intro:"A judgment in your favour is worthless if the defendant has no assets to enforce against. Enforcement is a separate process from litigation.",
   concept:"Enforcement is the process of recovering the judgment debt from the defendant. Different enforcement mechanisms apply depending on where the defendant\'s assets are.",
   rule:"Domestic enforcement mechanisms: Writ of Execution (seize and sell movable property), Garnishee Order (attach debts owed to the defendant, including bank accounts), Writ of Seizure and Sale (immovable property), Judgment Debtor Examination (compel the debtor to disclose assets).",
   explanation:"Cross-border enforcement: a Malaysian court judgment must be registered in the foreign jurisdiction to be enforced there. Under the Reciprocal Enforcement of Judgments Act 1958, judgments from reciprocal countries can be registered in Malaysia and enforced. Arbitration awards are easier to enforce internationally (New York Convention).",
   why:"Understanding enforcement before commencing litigation helps assess whether winning will actually recover the debt. An insolvent defendant with no assets cannot satisfy a judgment.",
   hrbp:"Pre-litigation asset check: before investing in litigation, conduct a basic asset check on the defendant. Is there property? A profitable business? Bank accounts? If not, even a judgment may be uncollectable.",
   mistakes:["Spending RM100,000 on litigation to obtain a judgment against a defendant with no realisable assets","No enforcement steps taken after obtaining judgment — assuming the defendant will voluntarily pay"],
   scenario:"You obtain a judgment for RM500,000 against a company. They have not paid 30 days later. Next steps? Answer: (1) Issue statutory demand under Companies Act (grounds for winding up), (2) Apply for garnishee order against their bank accounts, (3) Register a charge against their property if any. Do not wait — assets can be dissipated.",
   law:"Rules of Court 2012, Order 45–48; Reciprocal Enforcement of Judgments Act 1958",
   takeaway:"Enforcement is a separate process from obtaining judgment. Pre-litigation: assess the defendant\'s asset position. Post-judgment: act immediately — garnishee orders, seizure and sale. Don\'t assume voluntary payment."},
],

'commercial': [
  {id:'cm1', title:'M&A Due Diligence — The Legal Lens',
   intro:'Legal due diligence determines whether you are buying what you think you are buying.',
   concept:'Legal due diligence (LDD) is the structured investigation of a target company\'s legal standing, obligations, and risks before completion of an acquisition.',
   rule:'Key LDD areas: corporate structure, material contracts, IP ownership, regulatory licences, litigation history, employment matters, data protection compliance, environmental obligations.',
   explanation:'LDD identifies: deal-breakers (risks that prevent the deal), price-adjusters (risks that affect valuation), and conditions precedent (things that must be fixed before completion).',
   why:'What you don\'t know in due diligence becomes your problem after completion.',
   hrbp:'Employment matters are a frequent LDD issue: misclassified contractors, pending unfair dismissal claims, unpaid EPF, and undocumented termination agreements.',
   mistakes:['Treating LDD as a checklist exercise without escalating red flags','Not negotiating appropriate warranty and indemnity protection for identified risks'],
   scenario:'LDD reveals the target has 15 contractors who have worked exclusively for them for 3 years. What is the risk? Answer: Likely misclassified employees — exposure to backdated EPF, SOCSO, EIS, and potential unfair dismissal claims.',
   law:'Companies Act 2016; Employment Act 1955; all sector-specific legislation',
   takeaway:'LDD surfaces risk. Price it, fix it, or walk away. What you discover is negotiable. What you miss is your problem after closing.'},

  {id:'cm2', title:'Joint Ventures — Governance and Exit',
   intro:'Joint ventures fail more often on governance design than on commercial fundamentals.',
   concept:'A joint venture (JV) is a commercial arrangement where two or more parties undertake a common enterprise with shared control.',
   rule:'JV agreement must address: ownership structure, governance (board composition, voting, reserved matters), decision-making deadlocks, capital contributions, IP ownership, and exit mechanisms.',
   explanation:'Reserved matters (decisions requiring unanimous or supermajority consent) are critical — they define the actual power balance in the JV regardless of share ownership.',
   why:'JVs combine parties with different objectives. Clear governance prevents disputes when objectives diverge.',
   hrbp:'Deadlock provisions are essential: what happens when the 50/50 JV partners cannot agree? Options: mediation, put/call options, Russian roulette provisions.',
   mistakes:['No deadlock mechanism — 50/50 JV with no tie-breaker is a recipe for paralysis','IP ownership in the JV entity without clear licensing back to parents upon exit'],
   scenario:'A 50/50 JV hits deadlock on a strategic decision. No deadlock provision in the JV agreement. What now? Answer: Negotiate. The only legal remedy may be winding up — an outcome neither party wants.',
   takeaway:'Governance design is more important than share ownership. Reserved matters, deadlock provisions, and exit mechanics must be negotiated before the JV is formed — not during a dispute.'},
  {id:'cm3', title:"Shareholders' Agreements — What Must Be In",
   intro:"A shareholders' agreement is the private governance document that fills the gaps in a company's constitution.",
   concept:"A shareholders' agreement (SHA) governs the relationship between shareholders in a private company. It is confidential (unlike the constitution, which is public) and can be more restrictive.",
   rule:"Key provisions: share transfer restrictions (pre-emption rights, drag-along, tag-along), reserved matters requiring shareholder approval, information rights, anti-dilution protection, board composition, dividend policy, and exit mechanisms.",
   explanation:"Drag-along: majority can force minority to sell on the same terms to a third-party buyer. Tag-along: minority can join a majority sale on the same terms. Pre-emption: existing shareholders must be offered shares before they can be sold to third parties.",
   why:"Without an SHA, the Companies Act defaults govern — often inadequate for sophisticated commercial arrangements.",
   hrbp:"When reviewing or negotiating an SHA: understand the exit mechanics. A SHA that has no realistic exit path creates an investor trap.",
   mistakes:["SHA with no deadlock mechanism for 50/50 arrangements","No anti-dilution protection for minority investor — subsequent funding rounds can wipe out their percentage without recourse"],
   scenario:"A startup takes funding and forgets to include anti-dilution in the SHA. The second funding round is at a lower valuation. What happens to the early investor? Answer: Their percentage is diluted without any protection. They should have negotiated anti-dilution (ratchet or broad-based weighted average) protection.",
   law:"Companies Act 2016; Contracts Act 1950",
   takeaway:"SHA must cover: transfer restrictions, reserved matters, deadlock, exit mechanics, anti-dilution, information rights. No SHA = Companies Act defaults govern. Companies Act defaults are inadequate for most sophisticated arrangements."},

  {id:'cm4', title:"Banking and Finance Law — The Basics",
   intro:"Every corporate lawyer advising on transactions that involve debt financing needs to understand the basic structure of lending documentation.",
   concept:"Banking and finance law governs the relationship between lenders and borrowers. Key documents: term sheet, facility agreement, security documents (charge, assignment, pledge, guarantee).",
   rule:"Key concepts: conditions precedent (must be met before drawdown), covenants (ongoing obligations of the borrower), events of default (trigger immediate repayment obligation), security (collateral for the loan), subordination (ranking of claims).",
   explanation:"Financial covenants: gearing ratio (debt:equity), interest coverage ratio, minimum cash holdings. Breach of financial covenant = event of default = lender can accelerate repayment.",
   why:"Debt financing is the most common source of corporate capital. In-house counsel must understand what the company has committed to and what the consequences of default are.",
   hrbp:"When a bank proposes a new facility: read the financial covenants. Do they require values that the business routinely achieves, or are they borderline? Covenant headroom determines the real risk of the facility.",
   mistakes:["Signing facility agreements with onerous financial covenants without modelling business scenarios","No monitoring process for financial covenant compliance — discovering a breach only when the bank accelerates"],
   scenario:"A company's net debt/EBITDA covenant is 3x. Due to a bad quarter, the ratio is now 4.2x. The bank has been notified. What happens next? Answer: The covenant is in breach — event of default. The company must seek a waiver from the bank immediately, before the bank exercises acceleration rights.",
   law:"Financial Services Act 2013; Contracts Act 1950; National Land Code (for land charges)",
   takeaway:"Read the financial covenants. Model them against realistic business scenarios. Monitor compliance quarterly. Engage the bank proactively at the first sign of covenant stress — never let them find it first."},
  {id:'cm5', title:"Agency Agreements — Principals, Agents, and Authority",
   intro:"An agent who acts without authority still binds the principal in many circumstances. This creates significant risk in commercial arrangements.",
   concept:"An agent is a person who acts on behalf of a principal to create legal relations between the principal and third parties. The agent's authority can be express, implied, or apparent.",
   rule:"Apparent authority: a third party who reasonably believes an agent has authority can enforce the contract against the principal, even if the agent exceeded their actual authority. This is why internal authority limits must not be communicated to third parties.",
   explanation:"Practical examples: a manager who regularly signs contracts without board approval creates apparent authority. Stopping this requires communicating authority limits to third parties — not just internally.",
   why:"Commercial transactions rely on agents. The apparent authority doctrine protects third parties who reasonably rely on agent representations.",
   hrbp:"Commercial signing authority: implement a delegation of authority matrix that specifies exactly who can bind the company for what types and values of contracts. Ensure the matrix is known to counterparties for large transactions.",
   mistakes:["Manager routinely signs contracts above their authority limit with counterparties who are unaware of the limit","No delegation of authority matrix — anyone with a business card can create binding obligations"],
   scenario:"A procurement manager signs a 5-year exclusive supply agreement. The company's internal policy requires board approval for contracts over 1 year. The supplier was unaware of this. Binding? Answer: Likely yes — apparent authority. The supplier reasonably believed the procurement manager could sign. The internal limit was not communicated to them.",
   law:"Contracts Act 1950, Part X (agency); common law",
   takeaway:"Delegation of authority matrix must be communicated to high-value counterparties. Internal limits alone do not bind third parties. Apparent authority creates binding obligations even where actual authority was exceeded."},

  {id:'cm6', title:"Regulatory Licences and Permits — Compliance and Transfer",
   intro:"Regulatory licences are business-critical assets. They cannot be transferred without approval, and non-compliance with licence conditions is a criminal offence.",
   concept:"Many Malaysian businesses operate under regulatory licences: banking (BNM), telecommunications (MCMC), broadcasting (MCMC), securities (SC), energy (SEDA/ST), and healthcare (MOH). Each carries its own conditions.",
   rule:"Licence conditions are legally binding obligations. Breach = criminal offence AND licence revocation risk. Licences are typically non-transferable without the regulator's prior approval.",
   explanation:"In M&A involving licensed businesses: the licence is usually the most valuable asset and cannot be assumed by the buyer without regulatory approval. Deal timetables must account for regulatory licence transfer process — can take 3–12 months.",
   why:"Without the licence, the business cannot operate. Regulatory approval is not a formality — it is the critical path.",
   hrbp:"Build a regulatory licence register for all entities in your group: licence type, issuing authority, conditions, renewal date, and any conditions being remediated. Review quarterly.",
   mistakes:["Completing a transaction involving a licensed business without confirming the licence transfer process and timeline","No monitoring of licence conditions — discovering a technical breach only when the regulator notifies"],
   scenario:"A private hospital acquires a smaller clinic. The clinic holds an MOH licence for a specific range of procedures. Can the hospital simply absorb the clinic? Answer: Not without MOH approval for the transfer or new licence. Operating without the valid licence is a criminal offence. Apply for approval before completion.",
   law:"Sector-specific licensing legislation; Companies Act 2016",
   takeaway:"Licence register: mandatory for any regulated business. Licence transfer requires prior regulatory approval — this drives M&A timelines. Licence condition monitoring is an ongoing compliance obligation."},
  {id:'cm7', title:"Guarantees and Indemnities — Key Distinctions",
   intro:"A guarantee is secondary liability. An indemnity is primary liability. This distinction is not academic — it determines whether a creditor can sue you directly without first pursuing the debtor.",
   concept:"A guarantee is a promise to pay another\'s debt if they fail to pay. An indemnity is a promise to keep someone harmless from loss. Guarantees have defences that indemnities do not.",
   rule:"Guarantee: creditor must first demand from the principal debtor (usually); guarantor has defences if the debt is unenforceable against the debtor. Indemnity: the indemnifier can be sued directly; the claim does not depend on the debtor\'s liability.",
   explanation:"Why this matters in practice: a parent company \'guarantee\' that is actually drafted as an indemnity can be called directly on the parent without first pursuing the subsidiary. Banks often insist on indemnities for exactly this reason.",
   why:"The distinction determines the practical enforceability of credit support. Getting it wrong can mean being sued directly when you expected to be a secondary obligor.",
   hrbp:"When reviewing any guarantee or indemnity document: read the operative clause carefully. Does it use guarantee language ('if X fails to pay, I will pay') or indemnity language ('I will keep you harmless from any loss')? The latter is stronger and has fewer defences.",
   mistakes:["Signing a document labelled 'guarantee' that is drafted as an indemnity — accepting primary liability unknowingly","Parent company giving a 'comfort letter' that crosses the line from moral support to legal obligation"],
   scenario:"A subsidiary enters a significant supply contract. The supplier requires a parent company guarantee. The document presented is labelled 'Guarantee' but the operative clause says 'the Guarantor hereby irrevocably agrees to indemnify and keep harmless the Supplier from any loss arising from the Buyer\'s failure to pay.' Is this a guarantee or an indemnity? Answer: This is an indemnity despite the title. The parent can be sued directly. Renegotiate to make it a true guarantee if primary liability is not acceptable.",
   law:"Contracts Act 1950, Part X (guarantee); common law indemnity principles",
   takeaway:"Read the operative clause, not the title. 'Indemnify and keep harmless\' = primary liability. 'If X fails to pay\' = secondary liability. The distinction determines whether you can be sued directly."},
],

'investigations': [
  {id:'inv1', title:'Internal Investigations — Process Integrity',
   intro:'A poorly conducted internal investigation can destroy your legal position and create new liabilities.',
   concept:'An internal investigation is a structured process to establish facts regarding suspected misconduct, fraud, or regulatory breach.',
   rule:'Core principles: independence, fairness (right to respond), confidentiality, document preservation, and proportionality.',
   explanation:'The investigator must have no conflict of interest. Employees under investigation must be given a fair opportunity to respond. Privilege may attach if the investigation is conducted at the direction of legal counsel.',
   why:'Regulators and courts assess the quality of internal investigations. A shoddy investigation creates its own liability.',
   hrbp:'Immediately upon suspecting fraud or serious misconduct: (1) Preserve documents (legal hold), (2) Identify the scope, (3) Determine who should investigate (often external for seriousness), (4) Consider privilege.',
   mistakes:['Interviewing the suspect before securing evidence','Sharing investigation findings broadly before the process is complete'],
   scenario:'Suspected fraud by a finance officer. CFO wants to confront the employee immediately. What do you advise? Answer: Do not confront first. Secure evidence, preserve documents, initiate investigation process. Confrontation before securing evidence allows destruction of evidence.',
   law:'Evidence Act 1950; Criminal Procedure Code; Employment Act 1955',
   takeaway:'Preserve evidence first. Investigate independently. Give right to respond. Control disclosure. Move swiftly but carefully.'},

  {id:'inv2', title:'Whistleblowing — Legal Protections and Corporate Obligations',
   intro:'Whistleblower protection is a legal obligation, not a management choice.',
   concept:'The Whistleblower Protection Act 2010 (WPA) protects persons who disclose improper conduct from retaliation.',
   rule:'Protection attaches when: (1) disclosure is made to a prescribed enforcement agency, (2) the discloser acts in good faith, (3) the disclosure relates to improper conduct.',
   explanation:'Improper conduct includes: crime, abuse of power, gross mismanagement of public funds, substantial and specific danger to health and safety, and breaches of law.',
   why:'Whistleblowers often surface the most serious misconduct. Protecting them is both a legal obligation and good governance.',
   hrbp:'Any adverse action against a whistleblower is itself an offence. Before taking any action against someone who has raised a concern, check whether WPA protection may apply.',
   mistakes:['Retaliating against a whistleblower (criminal offence)','No internal whistleblowing channel, forcing employees to go directly to regulators'],
   scenario:'An employee raises concerns about accounting irregularities and is subsequently retrenched. What is the exposure? Answer: Very high. WPA applies if the concerns were raised in good faith. The retrenchment may constitute prohibited retaliatory action.',
   law:'Whistleblower Protection Act 2010',
   takeaway:'Protect whistleblowers — legally required. Build internal channels so concerns surface internally first. Treat all investigations of retaliation allegations seriously.'},
  {id:'inv3', title:"Regulatory Investigations — How to Respond",
   intro:"When a regulator knocks, the first 48 hours determine much of the outcome.",
   concept:"A regulatory investigation is a formal inquiry by a regulatory body with statutory powers to investigate potential violations of the law.",
   rule:"Immediate response: (1) Do not destroy or conceal documents, (2) Identify the legal basis for the investigation, (3) Understand the investigator's powers (can they compel documents and interviews?), (4) Engage legal counsel immediately, (5) Cooperate within legal rights.",
   explanation:"Cooperation pays — regulators consider the quality of cooperation when determining penalty severity. However, cooperation does not mean waiving legal privilege or self-incrimination rights. Know the difference.",
   why:"Regulatory investigations are high-stakes events. Mishandling them — through obstruction, destruction of evidence, or inadequate legal response — turns manageable problems into existential ones.",
   hrbp:"Establish a regulatory response protocol before you need it: who leads (in-house + external counsel), who communicates with the regulator, document preservation immediately, and a communications blackout on social media.",
   mistakes:["Responding to regulatory inquiries without legal counsel present","Providing more information than is legally required — voluntarily waiving rights without strategic analysis"],
   scenario:"The Malaysian Communications and Multimedia Commission (MCMC) arrives with a search warrant and begins seizing documents. First action? Answer: Call legal counsel immediately. Identify the authority under which the warrant was issued. Do not obstruct. Do not volunteer information beyond legal requirements.",
   law:"Criminal Procedure Code; sector-specific legislation (MACC Act, MCMC Act, FSA, etc.)",
   takeaway:"Cooperate within your legal rights. Never obstruct. Never destroy documents after notification. Legal counsel must be involved from the first contact. Know your rights before regulators knock."},
  {id:'inv4', title:"Document Preservation — Legal Holds",
   intro:"Deleting documents after a legal claim arises (or is foreseeable) is one of the most serious acts of misconduct in litigation.",
   concept:"A legal hold (also called litigation hold or evidence preservation notice) is a directive to preserve all documents relevant to an anticipated or current legal matter.",
   rule:"Obligation to preserve arises when: litigation is filed, threatened, or reasonably anticipated. Destroying documents after this point = spoliation. Consequences: adverse inference instruction to the court (judge tells jury that the destroyed documents must have been unfavourable), costs orders, and in serious cases contempt of court.",
   explanation:"The trigger for preservation is not only when you receive a court claim — it is when litigation is 'reasonably anticipated.' A hostile complaint letter, a regulatory notice, or a credible threat of litigation all trigger the preservation obligation.",
   why:"The integrity of the justice system depends on parties preserving and disclosing relevant documents. Spoliating evidence undermines this.",
   hrbp:"Build a legal hold protocol: who can issue a hold, how it is communicated to relevant custodians, what systems are covered, how compliance is tracked, and when the hold is released.",
   mistakes:["Standard document deletion schedule runs and destroys emails after 90 days — after a litigation threat but before the hold is properly implemented","Issuing a legal hold notice but not stopping automatic deletion processes"],
   scenario:"HR receives a solicitor's letter threatening an unfair dismissal claim on behalf of a former employee. What is the immediate action? Answer: Issue a legal hold notice immediately. Preserve all documents relating to the former employee: emails, disciplinary records, HR notes, performance reviews. Suspend any automatic deletion for relevant custodians.",
   law:"Rules of Court 2012, Order 24; Evidence Act 1950",
   takeaway:"Legal hold triggers: litigation filed + litigation threatened + litigation reasonably foreseeable. Issue holds immediately on trigger. Cover all relevant systems. Track compliance. Spoliation consequences are severe."},
  {id:'inv5', title:"Digital Forensics and Electronic Evidence",
   intro:"Most modern investigations involve electronic evidence. Collecting it incorrectly destroys its evidentiary value.",
   concept:"Digital forensics is the process of preserving, collecting, and analysing electronic evidence (emails, instant messages, documents, device logs) in a way that maintains its integrity and admissibility.",
   rule:"Chain of custody: every person who handles digital evidence must be documented. The evidence must be preserved in its original state (forensic copies, not working copies). Metadata must be preserved.",
   explanation:"The most common mistake: having IT copy files off a suspect\'s computer using Windows Explorer. This modifies metadata (access dates), breaks chain of custody, and may render the evidence inadmissible.",
   why:"Courts require that evidence be authentic (it is what you say it is) and unaltered. Digital evidence that cannot be traced through a documented chain of custody may be excluded.",
   hrbp:"When an investigation involves electronic evidence: engage a qualified digital forensics professional. Do not have IT handle it. Issue a legal hold to preserve data before any device is accessed.",
   mistakes:["IT department copies files from a suspect\'s computer using standard methods — modifying metadata","No chain of custody documentation — anyone could have altered the files"],
   scenario:"Employee suspected of data theft. Manager takes the employee\'s laptop and plugs a USB drive to copy the files for HR to review. Problems? Answer: Multiple. No forensic imaging. No chain of custody. Accessing the laptop may modify evidence. The USB copy is not forensically sound. Engage a forensics professional before touching the device.",
   law:"Evidence Act 1950; Computer Crimes Act 1997",
   takeaway:"Digital forensics: forensic copy (not regular copy), chain of custody documentation, preserve metadata, use qualified professionals. Never let IT or HR handle digital evidence collection in a serious investigation."},
],

'advisory': [
  {id:'adv1', title:'Legal Risk Assessment — Advising in Shades of Grey',
   intro:'Every legal question has an answer. Most answers are not simply "yes" or "no."',
   concept:'Effective legal advisory requires quantifying risk, not just identifying it. Business leaders need probability assessments, not just a list of risks.',
   rule:'Legal risk assessment framework: (1) Identify the risk, (2) Assess probability, (3) Assess consequence, (4) Identify mitigants, (5) Recommend risk-based action.',
   explanation:'A 90% risk of a RM10,000 fine may be worth taking. A 5% risk of licence revocation may not be. Legal advice must translate legal risk into business decision terms.',
   why:'Lawyers who say "it\'s risky" without quantifying the risk are not adding value. Business decisions require probability and consequence, not just identification.',
   hrbp:'"There is a risk" is not legal advice. "There is approximately a 30% probability that X regulatory body would take enforcement action, with a maximum penalty of Y" is legal advice.',
   mistakes:['Binary risk advice ("this is risky" vs "this is fine") — reality is a spectrum','Refusing to give an opinion because there is legal uncertainty — that is always the case'],
   scenario:'CEO wants to launch a product in a legal grey area. How do you advise? Answer: Map the specific regulatory provision, assess enforcement probability, assess consequence, identify how to mitigate, give a calibrated view. Do not just say "it\'s risky."',
   takeaway:'Legal advice should be actionable. Quantify probability and consequence. Identify mitigants. Give a recommendation. "It depends" is a starting point, not a conclusion.'},

  {id:'adv2', title:'Managing External Counsel — Getting Value from Legal Spend',
   intro:'In-house counsel are the clients of external law firms. Managing that relationship effectively is a core skill.',
   concept:'Effective external counsel management: clear briefing, scope control, fee management, and performance monitoring.',
   rule:'Always brief external counsel in writing: facts, question, applicable law, urgency, format required, budget. Get a fee estimate before engaging. Review bills critically.',
   explanation:'Vague briefs produce expensive, unfocused advice. Hourly billing incentivises volume over quality. Fixed fees or capped fees align external counsel incentives with your budget.',
   why:'Legal spend is controllable. Most organisations overspend on external legal because internal legal does not manage it actively.',
   hrbp:'Build a panel of preferred external firms. Negotiate rates annually. Set KPIs: response time, budget accuracy, quality of advice.',
   mistakes:['Giving external counsel a vague brief and complaining about the bill','Not reviewing external counsel invoices for appropriateness of time spent'],
   scenario:'External counsel invoices 40 hours for a routine contract review. What do you do? Answer: Query the bill. Request a breakdown of time. 40 hours for a routine contract is disproportionate. Negotiate.',
   takeaway:'You are the client. Brief clearly. Scope specifically. Budget actively. Review bills critically. Manage performance. Legal spend is controllable.'},
  {id:'adv3', title:"Saying No Constructively — The In-House Lawyer's Skill",
   intro:"The worst in-house lawyers are known for saying no. The best are known for finding ways to say yes.",
   concept:"In-house counsel who reflexively say 'no' to business proposals add little value. The skill is identifying the specific legal risk, quantifying it, and finding structuring alternatives that achieve the commercial objective within an acceptable risk envelope.",
   rule:"Process: (1) Understand the commercial objective, (2) Identify the specific legal concern, (3) Quantify the risk (probability × consequence), (4) Identify structuring alternatives, (5) Recommend the path that achieves the objective with acceptable risk.",
   explanation:"'The legal risk is too high' is not legal advice. 'The specific risk is X, with a Y% probability of enforcement, and here are three ways you could achieve your commercial objective within an acceptable risk profile' is legal advice.",
   why:"In-house lawyers who enable business while managing risk are far more valuable than those who prevent it.",
   hrbp:"Before saying no to a commercial proposal: ask 'what is the business trying to achieve?' Then: 'what specific legal risk am I concerned about?' Then: 'how can the same objective be achieved differently?'",
   mistakes:["'I need to get legal sign-off' → legal says no → business finds a way around legal. This is how in-house teams lose relevance","Treating every legal risk as binary when most risks are on a spectrum"],
   scenario:"Sales team wants to offer a rebate structure that legal believes may violate competition law. Response? Answer: Not 'no.' Identify the specific competition law concern. Research the threshold. Redesign the rebate structure to stay within the safe harbour. Enable the business.",
   takeaway:"No is not a legal strategy. Identify the specific risk. Quantify it. Offer structuring alternatives. Enable business within acceptable risk bounds. Lawyers who say yes intelligently are far more valuable than those who say no safely."},

  {id:'adv4', title:"Contract Review Efficiency — Prioritising What Matters",
   intro:"Reviewing every clause with equal attention is inefficient. Prioritise the clauses that determine outcomes.",
   concept:"Contract review is the systematic analysis of a contract to identify terms that are unfavourable, unclear, or legally problematic. Efficient review prioritises high-impact clauses.",
   rule:"High-priority clauses: liability cap, indemnification, IP ownership, governing law, termination rights, representations and warranties. Medium priority: general obligations, reporting requirements, payment terms. Low priority: administrative provisions.",
   explanation:"The 80/20 principle applies: 80% of contractual risk is in 20% of the clauses. Focus analytical energy where it matters commercially.",
   why:"Legal time is scarce. Efficient contract review focuses on what can go wrong and how much, not on reviewing formatting.",
   hrbp:"When under time pressure: identify the three highest-risk clauses and address those. Flag everything else as 'standard' or 'minor comment.' A review that identifies the three critical issues is more valuable than one that comments on every clause but loses the client in the volume.",
   mistakes:["Commenting on every clause with equal weight — clients lose sight of what is actually important","Not asking 'what is the worst case if this clause is triggered?' before marking it up"],
   scenario:"You have 2 hours to review a 50-page supply agreement. What do you prioritise? Answer: Liability cap, indemnification, termination for convenience, IP ownership, governing law, force majeure. Read these closely. Skim the rest. The 2 hours should produce a focused memo on the 5-6 issues that matter.",
   takeaway:"High-impact clauses: liability, indemnification, IP, governing law, termination, warranties. 80% of risk in 20% of provisions. Comment with priority labels — critical vs minor. Help the client know what to fight for."},
  {id:'adv5', title:"Drafting Clear and Effective Legal Documents",
   intro:"The best legal document is the one that is never disputed. Clarity prevents litigation.",
   concept:"Effective legal drafting uses: precise language (not vague), defined terms (used consistently), short sentences (one obligation per sentence), active voice, and a logical structure.",
   rule:"Core drafting rules: (1) Define key terms once, (2) Use defined terms consistently — never use synonyms for a defined term, (3) 'Shall' = obligation, 'may' = discretion, 'will' = factual prediction, (4) Avoid doublets ('null and void', 'cease and desist') — use one word, (5) Avoid Latin (except for essential terms of art).",
   explanation:"The most dangerous drafting ambiguity: 'or' (exclusive or inclusive?), 'material' (undefined — left to dispute), 'reasonable' (without objective criteria). Define all terms that could be disputed.",
   why:"Poorly drafted documents do not mean what the drafter intended. Disputes about meaning are expensive. Clear drafting prevents expensive ambiguity.",
   hrbp:"Review your template documents: identify every undefined key term. Identify every use of 'material' or 'reasonable' without objective criteria. Identify every ambiguous 'or.' Fix these before the next version goes out.",
   mistakes:["Using 'shall' and 'will' interchangeably — they mean different things in contract drafting","Defining a term and then using both the definition and the original term in the same document"],
   scenario:"A contract says 'the supplier shall provide quarterly reports or monthly updates as agreed.' Does 'or' mean one OR the other, or one IN ADDITION to the other? Answer: This is ambiguous — 'or' can be inclusive or exclusive. A dispute is foreseeable. Rewrite: 'the supplier shall provide quarterly reports. In addition, the supplier shall provide monthly updates only as separately agreed in writing.'",
   law:"Contracts Act 1950; Interpretation Acts",
   takeaway:"One obligation per sentence. Define terms. Use 'shall' for obligations, 'may' for discretion. Avoid ambiguous 'or.' Test every document by asking: what does this mean if the relationship turns hostile?"},

  {id:'adv6', title:"Legal Project Management — Running Complex Matters Efficiently",
   intro:"Complex legal transactions fail not because of bad lawyering but because of bad project management.",
   concept:"Legal project management (LPM) applies structured project management disciplines to the delivery of legal work: scope definition, workplan, team allocation, timeline, budget, risk management, and client communication.",
   rule:"LPM elements: (1) Define scope and deliverables at the outset, (2) Build a workplan with owner, deadline, and dependencies for each task, (3) Allocate work to the right level (do not have partners doing associate work), (4) Track budget against estimate, (5) Communicate proactively — never let the client wonder.",
   explanation:"The most common failure mode in complex transactions: multiple advisers working in silos without coordination, issues discovered late that could have been identified earlier, and client surprises from advisers working without scope discipline.",
   why:"Complex transactions require coordination across disciplines. Without project management discipline, the transaction manages itself — which means it manages the advisers, not the other way round.",
   hrbp:"For any matter involving more than two advisers or more than 2 months' work: build a transaction workplan. Share it with all advisers. Run weekly update calls. Identify the critical path.",
   mistakes:["No workplan — each adviser does their part in isolation and discovers conflicts at signing","External counsel billing without budget visibility — costs spiral and surprise the client"],
   scenario:"An M&A transaction involving legal, tax, finance, and regulatory workstreams is 3 weeks from the target signing date. No shared workplan. What is the risk? Answer: Each workstream thinks they are on track; no one knows what the other streams need to complete. Signing date will slip because cross-stream dependencies were not identified.",
   takeaway:"Complex transactions require workplans. Owner + deadline + dependency for every task. Weekly update calls. Proactive communication. The critical path determines the deal timetable — identify it early."},
  {id:'adv7', title:"Board Presentations — Presenting Legal Risk to Non-Lawyers",
   intro:"Presenting to a board of directors requires a completely different approach to written legal advice.",
   concept:"Board presentations of legal matters must be: brief (boards operate in minutes, not hours), decision-focused (what do you need us to decide?), risk-framed (what is the exposure if we act / do not act?), and free of legal jargon.",
   rule:"Structure for board legal presentations: (1) What is the situation? (one paragraph), (2) What is the legal risk? (quantified where possible), (3) What are the options? (2-3 maximum), (4) What do you recommend and why? (one clear recommendation), (5) What do you need the board to decide?",
   explanation:"The most common mistake: presenting a long, hedged memo full of qualifications. Boards make decisions. They need your best judgment, not a comprehensive inventory of every risk.",
   why:"Legal advice that cannot be acted on is not advice — it is a disclaimer. In-house counsel who can present clear, actionable recommendations to boards are the ones who shape decisions.",
   hrbp:"Practice the 'elevator test\' for every board recommendation: can you explain the legal issue, the recommended course of action, and why, in 60 seconds? If not, the advice is not clear enough yet.",
   mistakes:["15-slide legal update with no clear recommendation — board members leave not knowing what to do","Every risk caveat included in the presentation instead of the written memo that supports it"],
   scenario:"Board asks in-house counsel to brief them on a major litigation claim against the company. How long should the presentation be? Answer: Oral briefing: 5-7 minutes. Supporting written memo: as long as needed. The oral brief should cover: nature of claim, worst-case exposure, probability assessment, recommended strategy, and what the board needs to decide.",
   takeaway:"Board presentations: one paragraph situation, quantified risk, 2-3 options, one clear recommendation, one decision required. Leave the hedging in the written memo. The board needs your judgment, not your qualifications."},
],

'amlcft': [
  {id:'aml1', title:'AML/CFT Framework — What It Is and Why It Matters',
   intro:'AML/CFT is not just a banking obligation — it applies to lawyers, accountants, and many other regulated sectors.',
   concept:'Anti-Money Laundering (AML) and Counter-Financing of Terrorism (CFT) laws require regulated entities to identify, assess, and manage financial crime risk.',
   rule:'Malaysia\'s framework: AMLA 2001 (primary legislation), BNM Policy Documents (for financial institutions), DNFBP requirements (for designated non-financial businesses and professions).',
   explanation:'Money laundering is the process of making illegitimate proceeds look legitimate. CFT prevents legitimate funds from being channelled to terrorist activities. Both are existential risks for licensed institutions.',
   why:'FATF (Financial Action Task Force) sets the international standards. Failure to comply leads to grey/blacklisting, which has severe trade and financial consequences.',
   hrbp:'Lawyers, accountants, real estate agents, company secretaries, and dealers in precious metals are designated non-financial businesses and professions (DNFBPs) with their own AML/CFT obligations.',
   mistakes:['Treating AML/CFT as a box-ticking exercise rather than a risk management function','No ongoing monitoring of customers post-onboarding — the obligation does not end at KYC'],
   scenario:'A client wants to use your firm to structure a large property transaction with cash payment. What AML/CFT obligations apply? Answer: Customer due diligence (KYC), source of funds verification, transaction monitoring. If suspicious, file a Suspicious Transaction Report (STR).',
   law:'Anti-Money Laundering, Anti-Terrorism Financing and Proceeds of Unlawful Activities Act 2001 (AMLA); BNM AML/CFT Policy Document',
   takeaway:'Know your customer. Verify source of funds. Monitor transactions. Report suspicion. AML/CFT is a continuous obligation, not a one-time check.',
   diagram:`<svg viewBox="0 0 320 110" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <text x="160" y="16" text-anchor="middle" fill="#3a9494" font-size="10" font-weight="700" letter-spacing="1">AML/CFT COMPLIANCE CYCLE</text>
  ${[['Risk\nAssessment','Understand your\nML/TF risk','#3a9494'],['Customer\nDue Diligence','KYC & source\nof funds','#4878c8'],['Transaction\nMonitoring','Ongoing\nsurveillance','#7a58a8'],['Reporting','STR filing\nwhere required','#a84848']].map(([l,d,c],i)=>`
  <rect x="${6+i*78}" y="24" width="70" height="78" rx="6" fill="${c}18" stroke="${c}" stroke-width="1.2"/>

  ${l.split('\n')[1]?`<text x="${41+i*78}" y="63" text-anchor="middle" fill="${c}" font-size="9" font-weight="700">${l.split('\n')[1]}</text>`:''}
  <text x="${41+i*78}" y="76" text-anchor="middle" fill="#8a92a8" font-size="7.5">${d.split('\n')[0]}</text>

</svg>`},

  {id:'aml2', title:'Sanctions and Targeted Financial Sanctions (TFS)',
   intro:'Sanctions violations are among the most severe regulatory breaches. The consequences are existential.',
   concept:'Targeted Financial Sanctions (TFS) require the immediate freezing of assets of designated individuals and entities, and prohibition of dealings with them.',
   rule:'Designations come from: UN Security Council, OFAC (US Treasury), EU Council, UK FCDO, and Malaysian domestic designations. Dealing with a designated person is a criminal offence.',
   explanation:'The sanctions regime has extraterritorial reach. Even non-US entities can face secondary sanctions for dealings with US-designated persons. This applies globally.',
   why:'Sanctions violations result in massive fines, loss of correspondent banking relationships, and personal criminal liability for officers.',
   hrbp:'Every financial institution must maintain a sanctions screening programme that checks all customers and transactions against the relevant lists before processing.',
   mistakes:['Screening only at onboarding — lists are updated daily, ongoing screening is required','No escalation protocol when a sanctions match is flagged'],
   scenario:'A payment transaction triggers a sanctions alert against the beneficiary. What is the immediate action? Answer: Freeze the transaction. Do not proceed. Escalate to compliance. Do not tip off the customer. Report if required.',
   law:'AMLA 2001; UNSC Resolutions; Malaysia\'s Targeted Financial Sanctions Regulations',
   takeaway:'Screen daily. Never process a transaction with a sanctions match. Freeze, escalate, and report. Personal liability attaches to officers who knowingly violate sanctions.'},

  {id:'aml3', title:'Customer Due Diligence (KYC) — The Foundation',
   intro:'Know Your Customer is not a one-time exercise. It is a continuous obligation.',
   concept:'Customer Due Diligence (CDD) is the process of identifying, verifying, and understanding your customers to assess financial crime risk.',
   rule:'Three tiers: Standard CDD (all customers), Enhanced Due Diligence (EDD) for high-risk customers/PEPs/transactions, Simplified CDD for verified low-risk.',
   explanation:'Politically Exposed Persons (PEPs) are individuals who hold or have held prominent public functions — they require EDD and senior management approval. Not all PEPs are corrupt, but all PEPs are higher risk.',
   why:'You cannot detect suspicious activity if you do not understand who your customer is and what their normal activity looks like.',
   hrbp:'Beneficial ownership is the critical question in CDD: who ultimately owns or controls the customer entity? Shell company structures that obscure beneficial ownership are a major financial crime red flag.',
   mistakes:['Treating CDD as a one-time onboarding exercise (it must be ongoing)','Not escalating PEP relationships to senior management for approval'],
   scenario:'Corporate customer has complex ownership with a shell company in a secrecy jurisdiction. How do you proceed? Answer: EDD required. Identify the ultimate beneficial owner. If beneficial ownership cannot be established, do not proceed.',
   law:'AMLA 2001; BNM AML/CFT Policy Document; FATF Recommendations',
   takeaway:'Know who you are dealing with. Know their beneficial ownership. Understand their expected transaction profile. Anything outside that profile requires investigation.'},

  {id:'aml4', title:'Suspicious Transaction Reporting (STR)',
   intro:'Filing an STR is a legal obligation — not a discretionary act of good citizenship.',
   concept:'When a regulated entity has reasonable grounds to suspect that a transaction or attempted transaction involves proceeds of crime or terrorism financing, it must file an STR with the Financial Intelligence and Enforcement Department (FIED) of BNM.',
   rule:'"Reasonable grounds to suspect" is the threshold — not certainty. The obligation arises whether the transaction proceeds or not (attempted transactions are also reportable).',
   explanation:'Tipping off is a criminal offence — once an STR is filed or under consideration, the subject must not be informed. The STR obligation applies regardless of the source or quantum of funds.',
   why:'STRs are the intelligence backbone of financial crime enforcement. Failure to file is a criminal offence.',
   hrbp:'Build an STR protocol: who can receive suspicious activity alerts, who makes the filing decision, who approves, how is confidentiality maintained. The compliance officer is typically the gatekeeper.',
   mistakes:['Not filing because there is "no certainty" of crime (certainty is not the threshold)','Tipping off the customer after filing an STR (criminal offence)'],
   scenario:'A customer attempts a large cash transaction, then cancels it when asked for source of funds documentation. Must you file an STR? Answer: Yes. The attempted transaction + customer behaviour creates reasonable grounds to suspect. File the STR.',
   law:'AMLA 2001, Section 14; BNM AML/CFT Policy Document',
   takeaway:'Reasonable grounds to suspect = file the STR. Certainty is not required. Tipping off is a criminal offence. File even for attempted transactions. Err on the side of filing.'},
  {id:'aml5', title:"Customer Risk Classification — High vs Standard Risk",
   intro:"Not all customers are the same risk. A risk-based approach requires knowing which ones to scrutinise most.",
   concept:"Customer risk classification assigns each customer a risk rating (high/medium/low) based on their potential to be involved in money laundering or terrorism financing.",
   rule:"Factors for high-risk classification: PEPs (politically exposed persons), customers from high-risk jurisdictions (FATF grey/blacklisted), complex ownership structures, cash-intensive businesses, sectors commonly used for ML.",
   explanation:"A risk-based approach means: more resources on high-risk customers, simplified procedures for demonstrably low-risk ones. The risk classification must be documented and periodically reviewed.",
   why:"Regulators do not expect zero risk. They expect proportionate risk management. The risk classification is the foundation of a defensible compliance framework.",
   hrbp:"PEP management: every PEP relationship requires senior management approval and enhanced due diligence. Regular review (at least annually). Monitor for adverse news.",
   mistakes:["Treating all customers identically regardless of risk profile (inadequate risk-based approach)","Not updating risk classifications when circumstances change (customer moves from private sector to government role)"],
   scenario:"A customer who was previously a mid-level executive is appointed as a Deputy Minister. How does their risk profile change? Answer: They become a Domestic PEP — High Risk. Trigger an EDD review, update the risk classification, seek senior management approval for the continued relationship.",
   law:"AMLA 2001; BNM AML/CFT Policy Document; FATF Recommendations 10–12",
   takeaway:"Risk-based approach = proportionate scrutiny. High-risk → EDD → senior management approval. PEPs always high risk. Review risk classifications when circumstances change."},

  {id:'aml6', title:"AML/CFT Programme — The Six Pillars",
   intro:"An AML/CFT programme is not a policy document. It is an operating system for managing financial crime risk.",
   concept:"A robust AML/CFT compliance programme has six pillars: (1) Board and senior management commitment, (2) Risk assessment, (3) Policies and procedures, (4) Customer due diligence, (5) Training and awareness, (6) Audit and independent testing.",
   rule:"Each pillar must be documented, implemented, and periodically tested. Regulators evaluate programmes against these pillars. A weak pillar = regulatory finding.",
   explanation:"The most common gap: Pillar 6 (independent testing). Organisations have policies (Pillars 3-4) but never test whether they actually work. Without testing, you do not know if your controls are effective.",
   why:"A programme that exists only on paper provides no protection — and no regulatory defence. Programmes must be operationalised and tested.",
   hrbp:"The compliance testing calendar: schedule quarterly testing of specific controls (e.g., sanctions screening effectiveness, transaction monitoring alert quality, KYC completeness). Document findings and remediation.",
   mistakes:["AML/CFT policy that was written at licence application and never updated","No independent testing programme — the compliance team reviews its own work"],
   scenario:"A regulatory exam finds that your transaction monitoring system generated 500 alerts last month but only 5 were reviewed. What is the finding? Answer: Inadequate transaction monitoring — a Pillar 6 failure. The control exists but is not effective. Massive regulatory risk.",
   law:"AMLA 2001; BNM AML/CFT Policy Document",
   takeaway:"Six pillars: commitment + risk assessment + policies + CDD + training + testing. Pillar 6 is where most programmes fail. Test your controls — don't just have them."},

  {id:'aml7', title:"FATF and Malaysia's International Obligations",
   intro:"FATF determines whether Malaysia stays in good standing with the international financial community. For banks and businesses, this is existential.",
   concept:"The Financial Action Task Force (FATF) is the global standard-setter for AML/CFT. Countries are evaluated through mutual evaluation reviews. Poor performance results in grey-listing (enhanced monitoring) or blacklisting.",
   rule:"FATF's 40 Recommendations set the international standard. Malaysia was grey-listed in 2019 and exited grey-listing in 2023 — demonstrating the real consequences of regulatory shortfalls.",
   explanation:"Grey-listing increases the cost and difficulty of correspondent banking. For a trade-dependent economy like Malaysia's, grey-listing is a significant economic risk. This is why BNM's AML/CFT requirements are stringent.",
   why:"FATF standards determine the international financial community's confidence in Malaysia's financial crime prevention. Non-compliance affects every Malaysian business conducting international transactions.",
   hrbp:"Understanding the FATF context helps in-house counsel explain to business why AML/CFT requirements exist. They are not bureaucratic overhead — they are the price of access to the global financial system.",
   mistakes:["Treating AML/CFT as solely a banking regulatory requirement — DNFBP obligations exist across many sectors","Not staying current with FATF guidance — standards evolve, and the country programme must keep pace"],
   scenario:"Your company loses its correspondent banking relationship because your bank is concerned about AML/CFT risks. What is the business impact? Answer: Inability to process international payments — potentially company-ending for an exporter. This is why AML/CFT compliance is existential, not administrative.",
   law:"AMLA 2001; BNM AML/CFT Policy Document; FATF Recommendations",
   takeaway:"FATF grey-listing = restricted access to global financial system. BNM requirements are stringent because Malaysia exited grey-listing in 2023. AML/CFT is not regulatory overhead — it is market access maintenance."},
  {id:'aml8', title:"De-Risking — The Compliance Overcorrection Problem",
   intro:"Refusing to do business with entire sectors or nationalities to avoid AML risk is called de-risking — and it is itself a compliance problem.",
   concept:"De-risking occurs when a financial institution or regulated entity refuses to provide services to entire categories of customers (e.g., money service businesses, NGOs, certain nationalities) rather than assessing risk individually.",
   rule:"FATF guidance: de-risking is not sound risk management. Blanket exclusions without individual risk assessment violate the risk-based approach principle. Regulators, including BNM, expect individual customer risk assessment, not categorical exclusion.",
   explanation:"The underlying tension: banks refuse accounts to money service businesses because the category is higher risk. But this drives MSBs to informal channels — which creates more financial crime risk, not less. Regulators increasingly push back on de-risking as a compliance strategy.",
   why:"De-risking denies financial access to legitimate businesses while not actually reducing financial crime risk. Regulators consider it a failure of risk management.",
   hrbp:"If your organisation has blanket exclusions of customer categories, review them. Are they based on individual risk assessment or categorical exclusion? The former is acceptable; the latter may be a regulatory finding.",
   mistakes:["Refusing all NGO accounts because 'terrorism financing risk' — without assessing each NGO individually","Terminating all accounts from a specific country because of geographic risk — without customer-level risk assessment"],
   scenario:"A bank refuses to open an account for a licensed money services business without any assessment of the specific business. BNM examines this. Finding? Answer: De-risking. The bank has applied a categorical exclusion rather than individual risk assessment. Regulatory finding likely, with required remediation.",
   law:"AMLA 2001; BNM AML/CFT Policy Document; FATF Guidance on De-Risking",
   takeaway:"De-risking = compliance failure, not compliance solution. Individual risk assessment required. Blanket categorical exclusions violate the risk-based approach. Higher-risk customers need enhanced controls, not automatic exclusion."},
  {id:'aml9', title:"Politically Exposed Persons (PEPs) — Enhanced Obligations",
   intro:"PEPs require enhanced due diligence and senior management approval. Getting this wrong is a common finding in regulatory examinations.",
   concept:"A Politically Exposed Person (PEP) is someone who holds or has held a prominent public function: heads of state, ministers, senior government officials, military officers, senior judiciary, senior executives of state-owned enterprises, and their family members and close associates.",
   rule:"EDD for PEPs: (1) Senior management approval before establishing the relationship, (2) Source of wealth AND source of funds verification, (3) Enhanced ongoing monitoring, (4) Annual review. These obligations apply to both foreign and domestic PEPs.",
   explanation:"Foreign PEPs are always high risk. Domestic PEPs are high risk — BNM removed the ability to apply standard CDD to domestic PEPs. A politician who retired 5 years ago is still a PEP — PEP status does not automatically expire.",
   why:"The correlation between political power and financial crime risk is well-established internationally. PEP relationships require proportionate scrutiny.",
   hrbp:"Build a PEP escalation protocol: clear definition of who qualifies, mandatory screening against PEP lists at onboarding and periodically thereafter, automatic escalation to senior management, documented approval records.",
   mistakes:["Treating domestic PEPs the same as standard customers — no longer permissible under BNM requirements","PEP status assessed only at onboarding — a customer who becomes a PEP after onboarding must be re-assessed"],
   scenario:"A long-standing business banking customer is appointed as a Deputy Minister. When the bank discovers this 6 months later, what must happen? Answer: Re-classify as PEP. Obtain senior management approval to continue the relationship. Conduct EDD including source of wealth review. Update monitoring intensity. Document all steps.",
   law:"AMLA 2001; BNM AML/CFT Policy Document; FATF Recommendation 12",
   takeaway:"PEPs: always high risk (foreign and domestic). Senior management approval required. Source of wealth AND source of funds. Annual review. PEP status does not expire automatically. Screen periodically, not just at onboarding."},

function allTopics() {
  const arr = [];
  for (const [catId, topics] of Object.entries(TOPICS)) {
    topics.forEach(t => arr.push({...t, catId}));
  }
  return arr;
}
function catProgress(catId) {
  const topics = TOPICS[catId]||[];
  if (!topics.length) return 0;
  return Math.round(topics.filter(t=>saved[t.id]?.r).length/topics.length*100);
}
function globalProgress() {
  const all = allTopics();
  const read = all.filter(t=>saved[t.id]?.r).length;
  const bkm = all.filter(t=>saved[t.id]?.b).length;
  return {pct:Math.round(read/all.length*100)||0, read, bkm, total:all.length};
}
function topicsInCat(catId){return TOPICS[catId]||[];}

// ═══════════════════════════════════════════════
// FORMATTING
// ═══════════════════════════════════════════════
function fmt(s) {
  if (!s) return '';
  return s
    .split(/\*\*(.+?)\*\*/g)
    .map((seg,i) => i%2===1
      ? '<strong>'+seg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</strong>'
      : seg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'))
    .join('')
    .replace(/\*(.+?)\*/g, (_,t) => '<em>'+t+'</em>');
}
function hl(s) {
  if (!searchQ||!s) return fmt(s);
  const re = new RegExp('('+searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return fmt(s).replace(re,'<mark>$1</mark>');
}
